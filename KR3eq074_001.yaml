body:
  text: 谷蓀醫話卷一壽命短長壽命短長各有定分然於職業亦有關係某報述英國新志之說謂人與壽命最短者客棧之茶房及大餐房之侍者平均一年間死亡之數為千分之二十三其次賣酒者為千分之十八其次掃除修築煙囪者屠牛者為千分之十四弱其次制鉛工匠泥水匠漆匠為千分之十一其次制面包者為千分之十點零五其次礦夫為千分之九零九最強壯長壽者大概為屋外辦事之人即以花匠園丁為第一其死亡之數不過千分之五云按此即內經生氣通天之理天之空氣即人之生原壽夭視吸受之多寡而分花匠園丁吸受空氣最多故壽命最長茶房餐房之侍者所受空氣最不鮮潔故壽命最短觀此可悟衛生之術又按張景嶽京師水火說謂燕京房屋當開頂隔以透空中所爇煤氣余謂此論尚未完備以其僅知煤氣之害人不知空氣之養人也至謂窗隙不如頂隔透氣之速則尤不然蓋熱氣漲則上升他處冷空氣必自旁入以填其空隙故開頂隔以透碳氣仍需窗隙以納空氣方見二氣互換出入之妙形色朱丹溪云凡人之形長不及短大不及小肥不及瘦蓋人生全賴陽氣短小而瘦者氣勝形長大而肥者形勝氣也又云人之色白不及黑嫩不盡蒼薄不及厚蓋色生於色油色油即中醫所謂陰液色黑蒼厚者陰必旺色白嫩薄者陰必虛也然有形色相符者有形色兩歧者如短小瘦之人又見黑蒼厚則為陰陽兩旺長大肥之人又見白嫩薄則為氣血兩虛此形色相符者如長大肥而見黑蒼厚又為強健之徵短小瘦而見白嫩薄又為早衰之質此形色兩歧當舍形而從色者也形以驗其陽色以觀其陰陰陽雖並重而陰實為陽之根陰旺陽亦旺故黑蒼厚之人不患其長大肥如充盈之家支用不妨干浩繁也陰虛陽亦虛故白嫩薄之人無取乎短小瘦如貧乏之家雖節儉猶苦不足也嗜欲不同孟子曰口之於味有同嗜也然有不盡言者如文王嗜菖武王嗜鮑魚楚王嗜芹葅屆至嗜芝曾督嗜羊棗劉雍嗜瘡痂之類此豈可以概諸人人又如我國人之嗜臭豆腐臭鹹蛋西人之嗜臭雉波斯人之嗜阿魏俄人之嗜醃菜臭北墨愛斯及母人之嗜魚油臭爪哇人之嗜土羅馬人之嗜昆蟲皆不可以常理者故內經曰嗜欲不同各有所通西諺曰惟味與色不可理釋此之謂也夫臭味之與嗜好且難強同而況氣性之於體質又安能強合耶孔子聖人也動為世法而王潛齊醫藥所載竟有學孔子不撒姜食而致危者孔子且不可學況其他乎居易録云江南蕭某食香菌則死又有王生者飲茶則死必二三日始蘇而潛齊又親見食鱉則醉飲蔗則衄啖海參必發熱者食物且然而況乎藥今之醫者不明體質之陰陽風土之強弱以一時偶驗之方視為定法以個人賦稟之偏視為通例擔頭鬥火篋里盤冰欲圖十全豈不難哉養老人身百體必有部分而為之連絡於其間者血管也靈蘭祕典論曰使道閉塞不通形乃大傷使道為何即是血管血管不啻則百體失其功用而知覺運動於以廢止故血管不啻交通之輪電也而血球即其裝運之貨物也貨物缺乏則求接濟干飲食飲食入胃以其滋養分輸入血管化而為血以循環於周身除舊布新以生以長者也雖然血管之接濟由於飲食血管之壅塞亦由於飲食此事從未有知之者英人愛凡司著延年益壽論發明土性鹽類令人變老之質其說最為明悉謂人之變老皆因飲食中含土性鹽類日積月纍充塞血管之中使之變硬變細變無因此百骸皆失其用而人以死故人年愈老血管愈細必稀血物如水果等方易通入而各酸又能滅身中熱度以免養氣之侵削自可延年而益壽其意欲人單食水果事雖不可行而言不為無理朱丹溪言老人當茹淡香辣甘膩皆能助火夫香辣助火人所知也甘膩只是難化何以亦能助火豈非以血管變細甘膩之物不能流通故鬱而為火耶蘇東坡曰人能淡食而徐飽者當有大益李祠部曰食欲得少而數不欲頓而多此於養老為宜蓋淡食則無壅滯之患少食則省消化之力既易消化又無壅滯之患則百脈常通生機不壅縱不能長生久視亦可以終其天年矣精神治療莊子曰醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也淮南子曰執獄牢者無病罪當死者肥澤刑者多壽心無纍故也神全而心無纍真攝生之妙訣芷園臆草載沈君魚病無他恙只是畏死令參禪而愈即神全而心無纍之效也福建通志劉菽邑諸生也因善病學醫醫多奇中嘗自言負病時獨居一室設木案置瓦瓶食器雞飛其上器輾轉欲墜地不為動色於是療者曰病可治故其為醫也亦以此法愈人此亦神全而心無纍之說也催眠術家言人之惡念由別善惡筋而發能阻天君筋之作用用催眠術令別善惡筋不用事則天君筋所發命令全身奉為神明故醫學家利用之而成精神治療之法昔耶蘇呼跛者起癲者愈即是此術此與全神養心之說其理自通天然復元喻嘉言曰善調身者身中自有大藥非草木所能仿其萬一英人稻惟德曰退病復元全賴自然之力非獨以藥見功毫期之年功用皆失雖有妙藥靈丹亦不能延年而益壽可見人身自有調攝之機足以驅除疾原而醫藥猶其後焉者也昔張隱菴患胃癰用運氣法使毒從腸胃而出是形質變壞尚能自為修補況氣化間病乎尹端模醫理略述謂人身有天然復元之法自是至論然則補法可盡廢乎是又不然人受天地之中以生陰陽不可偏勝有偏勝斯有不足於是有補養之法然必適可而止不可太過過則復為有餘亦非中道也據此則所謂補養者不過救偏之一助苟無所偏何藉乎補虛徐洄溪曰病去則虛者亦生病留則實者亦死其言病之不宜妄補也然病留而實者固不宜補病去而虛者豈一概禁補乎孫真人曰凡病服利湯得瘥者此後慎不中服補湯也若得補湯病勢還覆成也更重瀉之則其人重受弊也如初差氣力者未甚平復者但稍息之須服藥者當以平藥和之夫極虛癆應服補湯者不過三劑即止此即病去而虛者之補法又云夫常患虛之人不妨行走氣力未衰欲得補益冷熱隨宜丸散者可先服利湯瀉除胸腹中擁積痰實然後可服補藥此又先去其實後補其虛之法與石芝醫話謂以自鳴鐘比人身氣血周流最為切肖大鐘之停擺機械附鏽也磨擦運動則鏽去而機自靈人身亦然但去其病何慮其虛故補齊云人有以虛為貴者誠見道之言如腸胃不虛則不納九竅不虛則不靈經隧不虛則不通病去則虛者亦生孰知其生也正以其虛乎張子和曰良工治病先治其實後治其虛亦有不治其虛時又曰人知下之為瀉而不知不補之為補陳莝去而腸胃清病瘕去而榮衛昌不補之中有直補者存焉真名言也貴賤異治避暑録話云古方施之富貴人多驗貧下人多不驗俗方施之貧下人多驗富貴人多不驗蓋富貴人平日自護持甚謹其疾致之必有漸發於中而見於外非以古方術求之不能盡得貧下人驟中於寒暑燥濕飢餓勞逸之間者未必皆真疾不待深求其故苟一物相對皆可為也而古方節度或與之不相契豫按膏粱藜藿本不同治載於內經然亦不過強弱之分虛實之異如同補藥富貴人十劑有效者貧下人一劑足矣同一瀉藥貧下人倍劑有效者富貴人半劑足矣必謂富貴人宜古方貧下人宜俗方則非也蓋富貴人所延診者程度略高稍有涉獵貧下人所延診者知識庸淺粗解藥性人見其各著治驗遂謂富貴人宜古方貧下人宜俗方過矣且以吾所經驗者言之古方則宜於貧下人而不宜於富貴人與彼所言適得其反蓋一病有一病之兼症病所同也證所獨也古人相病立方其兼證之千頭萬緒古人無以預測而富貴人最多兼證當其未病之先已有種種虧虛之地留隙召邪實非古方所能兼顧貧下人臟腑兼顧一病但有一病之主方病去而體自復嘗見一種粗工以傷寒成方混治鄉人四時雜感有時亦收捷效職是故耳愈病非難內經云上工十全九中工十全七下工十全六可見醫無十全而下工亦多詭遇也又云妄治時愈愚心自得又雷公有不可治之證粗工下砭石而愈帝曰譬以鴻飛亦衝於天可見愈病非難知病為難讀倉扁之傳乃知所重在彼不在此淮南子曰所以貴扁鵲者非貴在隨病而調藥貴在息脈血知病之所從生也不知病所從生縱能治愈皆是偶中孫真人云一百一病不治自愈一百一病須治而愈一百一病醫治難愈一百一病真死不治又曰凡病五臟未虛六腑未竭血脈未亂精神未散服藥必效若病已成可得半愈病勢已過命將難存夫病之未成者雖下工為之而有餘不必其方之果善也但陰陽虛實大致不誤以一二對證之藥投之皆能獲效即不效亦不致死徐洄溪所以有誤藥不死之論也如其病已成非上工斷不能為如病勢已過雖上工亦無所施而上工不常有即有亦不易致非已成已至之證不即延治故上工無赫赫之功而反多求全之毀洄溪所以有名醫不可為之論也據理之與經歷有據理為治之醫有經歷為治之醫據理為治者先明其所以然之理以之施治其效可以預卜程子謂醫不讀書縱成倉扁終為技術之流者以不讀書則處理不明故也經歷為治者如古今所傳驗方祕訣但從經驗而來不拘常制而至理相感雖聖人有所不能測禮記謂醫不三世不服其藥者以非三世則經歷不多故也考古方書從經歷而得者居多其效往往駕據理者之上惟其方浩如煙海有倉猝尋求按要難得之苦更有證出希奇人難習見非平時博覽何以應變於臨時觀吳醫匯講中醫宜博覽論所載如截腸其症大腸頭忽出寸許痛苦難忍干則退落又出又落出於夏子益奇方其法以臀坐浸於芝麻油內再日飲麻子汁數盞不數日即愈虜瘡其症驟然周身發泡流水皮膚毫無空隙載於彭用光普濟良方雲系建武中南陽擊虜所得與此症情悉合須得蜜煎升麻拭摩若不即療數日必死證皆不習見之證書皆不習見之書非博聞強記孰能識別至青腿牙疳一證載在醫宗金鑑而當日外科無人或識眼前之書且不知閲況其它乎道光中江陰有吳士瑛者字俯恬豫家有其所著痧疹論抄本頗佳自述少時見一小兒患溫邪咳嗆漸止喘促胸高聲如曳據久治不愈吳不識為何病有周某曰非馬脾風乎詢伊方治則云忌之囑其檢書又未查出越兩日遂不起後得大驚散牛黃奪命散四將軍散等法因悟土鬱奪之金鬱治之之理始嘆醫貴博覽悔不早知此方筆之於書引為恨事焉扁鵲有言人之所病病疾多醫之所病病道少醫豈易為哉調氣喻氏有人身元氣專與人身為難之說徐忠可注金匱諸毒多是假毒以損元謂一試之毒何能殺人乃假些微毒氣滲入元氣反為毒氣作使至不可療是元氣可以化病氣也鄒潤安謂凡藥所以致生氣於病中化病氣為生氣所著本經續疏一本此旨是病氣又可以化生氣也有人但知補元氣乃有元氣未復而病氣加甚者但知去病氣乃有病氣未去而生氣先漓者誠知元氣可以化病氣病氣可以化生氣則於調氣之道思過半矣古聖賢識藥孔子某未達不敢嘗則其所取嘗者必其所以達者也其素悉藥性可知大抵古聖賢類能識藥芣苡治難産載在毛詩吳茭山記一婦難産用車前為君冬葵子為臣白芒枳殼為佐使已服午産衆異之吳曰本藥謂催生以此為君毛詩採芣苡以防難産蠐螬治失明載在孟子陳氏經驗方云晉書盛彥母氏失明躬自侍養母食必自哺之母既病久至於婢使數見捶撻婢忿恨伺彥他出取蠐螬炙進之食以為美然終疑是異物密藏以示彥彥見之抱母慟哭絶而復蘇母目豁然從此遂愈孟子曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽後耳有聞目有見本草云蠐螬汁滴目中去翳障余在曲江有將軍以瞽離軍因閲晉書見此參以孟子之言證以本草之說呼其子俾羞事而供勿令父知旬日後目明趨庭申謝因録以濟衆此等單方不但經生不知即專門醫學亦鮮能採用輕藥愈病徐洄溪輕藥愈病論謂病之不治自愈者自以不服藥為中醫如不治難愈或竟不愈固當服藥乃不能知醫之高下藥之當否不敢以身嘗試則莫如採平易輕減之方以備酌用小誤亦無窖對病有奇功此則不止於中醫矣真閲歷有得之言在洄溪原為病家說法非為醫家立訓豫以為醫家亦不可不知世稱繆仲淳治病於本草擇用五六十種無過之藥屢獲奇驗無以多為殆深知輕藥愈病之理者蓋以輕代重古人本有此法褚氏遺書云用藥如用兵用醫如用將善用兵者徒有車之功善用藥者姜有桂之效又云世無難治之病有不善治之醫藥無難代之品有不善代之人丹溪云豫每效仲景立方效東垣用藥蓋立方之妙無逾仲景而藥則東垣為平易也然如後世畏麻桂之猛而用羌獨畏硝黃之峻而用曲查此則如騎劫之代樂毅趙括之代廉頗矣故輕藥愈病並非苟為便易者所得藉口也病因藥成又隨藥變藥以治病也然不治者病反因藥而成趙養葵云咳嗽吐血未及成瘵也服四物知柏之類不已則瘵成矣胸滿膨脹悒悒不快未必成脹也服山查神麯之類不止則脹成矣面目浮腫小便祕澀未必成紅也服滲利之藥不止則水成矣氣滯胸塞未必成噎也服青皮枳殼寬快之藥不止則噎成矣又有本非某病妄作某病治者病又隨藥而變張石頑云嘗見一人患項腫發熱延傷寒家視之則曰大頭傷寒以表藥發之頭亦脹確乎大頭無疑矣易延雜症家視之則曰濕熱痰火以里藥攻之頭與項前左半皆消但項後右側偏腫則確非大頭而為雜症矣更延癰疽家治之則曰對口偏疽以托裡敷外藥治之則氣血阻遏竟成潰瘍矣古語不藥為中醫殆有鑑於此歟一者因得之曹仁伯繼志堂醫案遇病機叢雜治此礙彼者每合數方為一方自謂周到不知此正許胤宗所謂絡原野術之最疏者也內經曰一者因得之言病雖萬變而推求至理必歸於一舉一可以賅萬否則治絲而夢也古人中如劉河間專主火王中陽專主痰朱丹溪專主氣血痰鬱王清任專主瘀血其用方也如易思蘭只一越鞠丸趙養葵只六八味薛立齊只二味補中魏玉璜只一集靈膏此余皆非中道然較救頭救腳之醫則又勝於彼但不可與淺人言耳上下寒熱不同病有上寒下熱者有上熱下寒者不得不分頭醫治求之名人皆有妙法嵩岩專主治上寒下熱用炒瞿麥引上寒以下降炙草蔥姜推下熱以上行陸養愚治一人素患腸風便燥又因過食生冷致胃脘急而痛溫之則腸紅如注涼之則心痛如刺此所謂胃中積冷腸中熱也治之以潤腸丸沉香為衣薑湯送下血減便利心口未舒治之以臟連丸亦用沉香為衣薑湯送下以清下熱而潤燥又用附子理中料為散飴糖拌吞取其戀膈以溫中此治上寒下熱之大法也張鋭治一虛後既患大泄又患喉痹兩症並見治此礙彼為用理中丸裹紫雪喉痹非寒藥不可泄瀉非理中不可紫雪下咽則消釋無餘得至腹中則附子藥也陳遠公用醋調附子或面調茱萸貼湧泉穴以引火歸元然後以大劑六味地黃丸與之治虛火上騰誤用寒涼喉閉而又腹瀉之證此治上熱下寒之大法也進觀傷寒論立瀉心湯黃連湯乾薑黃連黃芩人參湯白通加豬膽汁湯四逆加豬膽汁湯其於上下寒熱不同之治尤粲然大備化而裁之遊刃及餘地矣藥味相反一人患砂淋醫以昆布海藻與甘草並用其所親某以藥味相反為疑醫引東坡說為證已而病者服藥竟大吐不受轉方去甘草始安某竊喜自負達藥以告余余曰豫知其一未知其二余曾治一乳岩以昆布海藻與甘草並用病家亦以為疑然服之競效大約要看病在何部耳病在上中二部非與甘草並用不可甘草緩中能緩昆布海藻不令直過病所俾得稽留以成功東垣治結核用此法正是此意若病在下部正須令其速達病所乃以甘草緩之反令未病之人無辜受纍其不能容受而致傾吐宜矣某乃歎服藥味相合程子曰醫不論理則處方論藥不盡其性只知逐物施治不知合和之後其性又如何假如訶子黃白礬白合之而成黑黑見則黃白皆亡又如一二合而為三三見則一二亡離而為一二則三亡既成三又求一與二既成黑又求黃與白則是不知物性沈存中曰水銀得硫黃而赤如丹得礬石而白如雪酸無過於醋益之以橙二酸相濟而反甘巴豆善利益之以大黃則其利反折蟹與柿嘗食之而無害也二物相遇不旋踵而嘔此色為易見味為易知而嘔利為大變故人人知之至於相合而至他臟致他疾者庸可知耶按此即汽質流質定質加熱減熱三質遞變之法與兩物交感化合之理內經所謂制則生化也若令二公潛心醫學當必另有發明豈各家本草逐件分注者所能比擬豫按古說大黃甘草同用能利小便麻黃熟地同用但開腠理而無滯膩發散之弊茱萸黃連同用能消肝氣鬱痛肉桂黃連同用能交心腎於頃刻茯苓得白朮則補脾得車前則利水得澤瀉則滲濕黃耆得防風其功愈大青皮得芥子治右脅痛附子不遇乾薑雖通經絡而不熱肉桂不入腎以澤瀉引之則入絳雪園得宜本草於此獨為詳備不可不究心焉以意用藥中藥辨氣味西藥辨原質比而觀之西醫徵諸實中醫遁於虛然實者有時窒礙而難於行虛者常若靈變而難測嘗閲古方竟有以意用藥並氣與味亦不深辨者三深叔云醫藥治病或以意類取如百合治病似取其名嘔血用胭脂紅花似取其色淋瀝結滯則以燈草木通似取其類意類相假變化感通不可不知其旨也東坡云歐陽文忠嘗言有患疾者醫問其得疾之由曰乘船遇風驚而得之醫取多年舵牙為舵工手汗所漬處刮木雜丹砂茯神之流飲之而愈本草注引藥性論云止汗用麻黃根節及古竹扇為末服之文忠因有醫以意用藥多此比初似兒戲然或有驗殆未易致潔也豫因謂公以筆墨燒灰飲學者當治昏情耶撫此而廣之則飲伯夷之盥水可以療貪食比干之餕餘可以已佞舐樊噲之盾可以治怯嗅西子之珥可以療惡矣公遂大笑按顧曉瀾吳門治驗録治痰迷心竅所讀之書皆不記憶用茯神遠志陳半菖蒲膽星珍珠母甘草而以惜字爐灰煎湯代水煎藥服之獲效觀此則筆墨灰治昏惰亦或有之事歟地黃熟地黃中古以前鮮用神農本草經只有乾地黃且云生者尤良至唐以後始有熟地之制地黃本是血藥惟生用則性涼而滑利熟則膩滯而不涼血貴流行故熟地未敢浪用張景嶽喜用熟地當時有張熟地之稱此醫之偏者也近有人謂熟地內含鐵質最多為補血要藥豫謂質本生成不以生熟而異若以氣味論則生者獨優不可漫無分別至景嶽所制左歸飲加減一陰煎等方皆重用熟地無知妄作久為識者所譏而或乃以治肺癆真殺人之事也肺癆皆緣傷風而起內經謂勞風法在肺下諺云傷風不醒變成癆是也治法極為繁難非粗工所能措手若用熟地困住風邪輕病必重重病必死在稍明醫理者類能言之而今之著書者乃全然不省何歟千金制熟地黃法乃別采地黃搗汁揀其肥者蒸暴以汁盡為度傳信適用方有八味圓問難其制地黃法乃取地黃生者去土投水中浮者為天黃中者為人黃沉者為地黃先將地黃蒸良久天黃人黃搗汁取蒸地黃投其汁中候冷如此者三曝乾以酒浸一宿蒸曝乾此等製法今無有知者矣附子傷寒論太陽篇證象桂枝誤加附子而亡陽者先用甘草乾薑湯回其陽繼以芍藥甘草湯救其陰後以承氣湯止其譫語今人但知附子為回陽之品孰知誤用反能亡陽乎亡陽者以附子回陽因誤服附子而反致亡陽者又當以乾薑回陽古人言附子行而不止乾薑止而不行改制附子之行必用乾薑之守此又用藥之權衡救誤之妙法也此節解者多誤故論正之當歸張景嶽謂當歸營虛而表不解者佐之以柴胡麻桂等劑大能散表景嶽發揮譏之曰若講當歸發汗此岐黃後出之語豫按醫存載一僕人冬月傷寒頭痛午熱無汗發之三日不解六脈沉細以當歸三兩煎服自愈又一行商傷寒發汗不出用當歸四兩得汗醫存云當歸能溫血血溫則汗出此與王海藏論精敞發汗是調血而汗自出同理傷寒論云尺中遲故不可發汗以營氣不足血少故也夫血少不可發汗而病又非汗不解治術不幾窮乎本論既主方治而景嶽大溫中飲補血散寒滋陰發汗正可補仲景所未備王孟英治婺人羅無奎陰虧傷寒脈虛細已極用景嶽法以熟地當歸白芍炙草桔皮柴胡為劑一劑而瘳景嶽固未可厚非也川芎東垣曰頭痛須用川芎丹溪曰氣鬱須用川芎又曰血不歸元久服藥而無效者以川芎為君則效豫按川芎氣味辛溫辛能散氣溫能行血氣血諸病之因於寒者服之有效東垣本經主治中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子寒痹寒字可賅諸症言蓋痹有寒熱二候此專治寒痹則知其餘主治諸症亦皆屬寒今不問證之寒熱但見頭痛氣鬱血不歸元概以辛溫從事則痛者愈痛郁者愈郁溫者愈溫矣沈括夢溪筆談言久服川芎令人暴死豈非以辛溫香竄耗散真元耶西醫論頭痛有腦積血與腦缺血之不同積血為實缺血為虛實者責其血之不降虛者責其血之不升川芎辛溫血不升而虛者借為引用因自有效血不降而實者用之不致腦脈爆裂不止筆談所載暴死證雲系腦風以豫臆度當是血不得降之實證久服川芎腦脈爆裂故死必猝暴耳石膏古之石膏産琅琊山經雷雨後土中爆出如雞子大辛涼之中寓升發之性今之石膏非復漢唐時物故功力較遜且有以方解石當之者觀錢氏直訣知宋時已然近有人謂石膏毫無功用不堪入藥非所論於古之石膏也丹溪云石膏火煅細研醋調封用爐其固密甚於脂苟非有膏焉能多用此兼質與能而得名者又觀西醫用石膏塗抹布條裹扎折骨等證灑水變硬使骨不移動非有膏漿焉能灑水變硬據此則後世石膏雖非漢唐時物究非灰石一類可比其止渴去火解肌出汗之力自不可及白虎證死生在反掌之間苟非重用石膏必無挽回之理然證情善幻有血虛象白虎證有氣虛象白虎證誤用石膏必死血虛象白虎證肌熱燥熱困渴引飲其脈洪大重按全無此血虛發熱之證東垣以當歸補血湯治之氣虛象白虎者如丹溪治鄭義門秋間大熱口渴妄言妄見脈洪數而實視其形肥面赤帶白卻喜露筋脈本不實涼藥所致與黃耆附子湯飲之三帖後困倦鼾睡口微汗而解脈亦稍輕繼以耆朮湯調治而安按東垣所辨在脈洪重按全無是脈虛血虛之驗丹溪所辨在形肥面帶白色是素稟陽虛之徵且二證皆無汗故知非白虎證傷寒論云發熱無汗其表不解者不可與白虎湯徐洄溪云無汗二字最為白虎所忌用方不可不知陳士鐸云石膏辛散之味雖然去火而勢過猛裂實能爍盡真陰大熱之際不得已而用之過則真陰反耗而火仍復沸騰豫觀薛氏醫案有誤服石膏七竅流血者己任編有誤服白虎湯以致熱甚如燔衝開三五尺人不能近者豈果辛散之力使然耶要而論之不在辛散而在寒涼蓋火邪驟為寒涼所郁激之反動是以致此與中暍死者不可得冷同理內經寒因熱用正慮此耳余親見一醫治溫病與石膏一兩反見鼻衄易醫以為藥輕加至二兩衄轉甚繼以前方加附子乃愈按冷廬醫話載顧松園治汪纘功陽明時感用大劑白虎熱證頓減而發嘔諸醫咸詆白虎之誤投參附而勢更危復求顧診仍用白虎大劑二服始愈遂著論以為溫熱病中宜用白虎並不傷人必解世俗之惑豫謂此等治法實未盡善其發厄也安知非火為寒鬱兩相沖突所致諸醫但詆白虎傷陽不知又為寒鬱之理妄用參附宜反為顧笑然卒以白虎而愈則又安知非藉附子之力預為之地使火不郁而後石膏始得奏功乎白虎證者口渴汗大出脈洪大是也白虎湯石膏知母甘草粳米是也菟絲子黃山谷信服菟絲子謂久服不令人老服三兩月其啖物如湯沃雪半歲則大肥壯矣而陸放翁老學庵筆記言其族弟少服菟絲子數年後發背疽豫謂菟絲子補腎年少人腎氣太盛邪火內動類能發疽不得委過於菟絲也葛常之韻語陽秋云山谷在貶所曾士衰有書勸黃勿服金色茶山谷報云公袞痘根在旁乃不可食庭堅服之如暗云之在山谷安得有霹靂火也觀此講服食先宜養心山谷提養生之四印檐曝偶談山谷送張和詩云我提養生之四印謂忍默平直也所謂百戰百勝不如一忍萬言萬當不如一默無可採擇眼界平不藏秋毫心地直故服金石而無害況在氣味和平之菟絲乎嘗觀古人服食調補之方類多溫藥令人服之俱不利蓋今人無古人之醇朴內多欲而火易動故也澤瀉理虛元鑑論澤瀉云肺為氣化之源伏火蒸灼則水道不行而益病且水停不流則中土濡濕而舉止無力故豫治癆嗽吐血之症未有不以導水為先務每稱澤瀉有神禹治水之功究其命名之意蓋澤瀉者澤其不足之水瀉者瀉其有餘之火也惟其澤也故參地膠芍得之則補而不滯其瀉也故走濁道而不走清道不若豬苓木通腹皮等味之消陰破氣直走其道要知澤瀉一味肺脾腎三部咸宜所謂功同神禹者是也古方六味丸用之功有四種頤生微生論論之極詳庸醫不審視為消除損腎之品置而不用何其謬也豫按治虛勞以導水為務識見高人一等夫所謂導水者即血中之廢質肺腎膀胱皮膚構造皆主排泄此水者也而腎則尤為重要澤瀉入腎所以助其排泄之力令水去而血液清潔百骸皆得其養有何虛勞之足患今人但知補腎引錢氏有補無瀉之說以為至論然錢氏六味丸何以用澤瀉乎徐靈胎論八味丸專利小便驅邪水其意以為功用不過如是而小視之抑知惟其如是是即莫大之功用乎牛膝王漢皋醫存力言牛膝之害謂脾濕泄瀉及胞濕尿濁用之則腿腫下部有疾用之則生瘤中氣虛用之則下陷於二便小腸有濕寒用之則為濁為濕有濕熱用之則為淋腎有熱用之則強中孕婦服之則墜胎皆因其性下行也此說不可不知豫按葉氏溫熱論有重則如玉女煎之論唐立三本刪去一如字竟印定如玉女煎原方不知身熱未退原方中之熟地牛膝安可投乎王孟英謂原文玉女煎者言如玉女煎之石膏地黃同用然是用其原方楊素園稱其慧心明眼絶世聰明豫閲靜香樓醫案治熱病邪火熾甚案語云宜玉女煎而方則生地石膏麥冬知母竹葉甘草等味尤氏葉氏同時可見當日吳醫所稱玉女煎本非原方殆亦傳派如此然不如孟英直稱白虎加生地之為當也方諸水薛一瓢溫熱病篇所用方諸水即本草綱目之明水周禮司烜氏以火燧取明火於日鑑取明水於月以供祭祀淮南子方諸見月則津而為水注者或以方諸為石或以為大蚌或以為五石煉成或以為銅錫為之豫謂金石固無取水之理觀陳藏器所云明目止渴則專指大蚌取得之水言實亦有名而無其物乃古書之讕言不知薛氏何所見而用之王孟英云方諸水難得俗以蚌水代之腥濁已甚宜用竹瀝為妙豫意薛氏所云方諸殆即蚌水特美其名曰方諸耳蚌水即綱目拾遺中之蚌淚色蒼入肝有清熱安胎消痰除濕之用為真陰天一之精似非竹瀝之所能代薛氏不直曰蚌水而曰方諸未免好奇之過酒內經云酒入於胃則絡脈滿而經脈虛蓋酒性猛裂能徑入循環之血內使心跳加速脈管漲大其血一時升至表面故表面之細絡反滿而裡面之經脈反虛也凡人飲酒面呈赤色即絡脈滿之故酒後有發寒者即經脈虛之故西醫驗得各種食物消化時熱度皆升獨飲酒則熱度漸降正以精華外泄內反虛寒也此與冷水浴身之理正得反比例冷水浴身而身反熱者熱迫於里力能反感也飲酒禦寒而身反寒者熱散於外難以為繼也以此類推則知風寒化熱與冷浴身熱無殊暑汗亡陽與飲酒身寒何別又內經云西北之氣散而寒之東南之氣收而溫之亦是此理蓋西北地寒用藥本宜溫熱然或熱逼於裡熱深厥甚又以辛寒為宜東南地溫用藥本宜清涼然或熱散於外遂漏不止又以辛溫為宜所謂假者反之也酒能引藥上行杜清碧病腦疽自服防風通聖散數四不愈朱丹溪視之曰何不以酒製之清碧乃悟不盡劑而愈又凡用大黃治上部之邪必須酒浸方能引上至高之分如物在高巔必射而取之此東垣法也本草備要云蘆稷即蘆最能和中昂嘗病腹中啾卿經兩月有友見招飲以蘆稷燒酒一醉而積疴暢然又吾鄉程偉堂王學瑣記載一汪姓少年得怪病耳中如聞人云齊桓公晉文公皆霸諸侯也目中便見一霸字初小後大極於彌天匝地人遂暈絶逾日始蘇每月常三五次諸醫莫明其症有羅日亭者診之曰此怪痰為患不須服藥宜飲高粱酒百斤便愈已而果驗此二條皆指燒酒燒酒前古所無至元時始創其法今日家家能釀豪飲者非此不歡其性大熱大毒能消冷積祛痰飲備要所載得其消積之功瑣記所載得其祛痰之力同一酒也而蘆稷高粱功用微異推之朱麥所造當亦各有專長録此以備留心食療者之隅反茶古人冬日則飲湯夏日則飲水自秦人取蜀而後始有茗飲至唐風俗貴茶遂有蒙頂石花黃芽紫筍等名逮及明季西班牙葡萄牙人貿易東來視為佳品攜歸國中由是世界各國幾無不嗜茶者按茶苦甘微寒能消食去痰除煩醒睡清肺涼肝提神行氣化學家謂茶含淡氣頗多蓋於清涼之中而寓抒發之性者千金治痰厥頭痛用以引吐正以含淡故也茶之産地甚多名色不一大致分紅緑二類緑者為勝紅經蒸盦失性易致停飲此王潛齊之言不可不知汪訒庵謂茶多飲寒胃則恐未必至云消脂則可信然盧子由論茶首舉令人瘦去人脂為茶之功考內經人有三形有膏人肉人脂人脂人血清氣滑少不能大按人之有脂所以護體內之熱且以濡潤肌骨使其流利而易動然脂多則反阻諸部之功用故人身最靈之部如頭及肺與眼胞俱不含脂脂人血清氣少陰盛而陽虛也其人必皆沉而困倦喜逸而畏勞故脂有惡其多必須減去者盧氏殆有見於此也然茶亦不過為飲食調劑之品如醬醋椒姜之例性雖消削若合一日中飲食計之些小之茶僅足以消酒食油膩無傷於脂也章杏云謂茶有消元息欲有他草木代之泥矣古人煎茶有候湯之法大約以三沸五沸為度不及三沸為嫩逾十沸為老皆不能發茶香故候湯非躬親其事不可今人不用煎而用泡既屬簡便而湯用百沸又可以殺水中微生物而免其毒害事有今勝於古者此類是也古人煎茶有用姜鹽者薛能詩云鹽損添常戒姜宜暑更誇東坡詩云老妻稚子不知愛一半已入姜鹽煎是也有用橄欖者貢玩齊詩云溪雨茶煎橄欖香是也有用桂花露者韓致堯詩云越甌犀液發茶香是也又按屠隆考磐餘事有蓮花茶橙皮茶以及玫瑰薔薇木樨蘭惠桔紅梔子木香梅花之屬皆用以拌茶有三停茶葉一停花之語今用姜鹽者絶無余則尚有沿用不廢者不獨奪茶味亦能變茶性且香能耗氣豈可常服之品耶水人非水火不生活而活字從水從舌是舌離水則不得活水固較火為尤重上古之人茹毛飲血不用火食反得長壽又似生活專在水而不在火西醫考得人身水質居百分之七十五少之則氣體不和又胃中化食腸中瀉物均需流質故西人於水漿等物極為注意愛凡司延年益壽論謂人常多飲水可以長壽千金翼有服水養生之法傷寒論有飲水愈病之說雖不必盡拘然亦可悟水之功用矣惟同是水也而性質各有不同張子和見漏水三周則滑而迅因悟性從地變質與物遷之理說詳儒門事親他若本草綱目本草逢源本草從新隨息居飲食譜等書分別尤詳悉故煎藥用水各有攸宜如所謂甘瀾水新汲水長流水古人於方後必為注明蓋水亦藥也今人不講久矣愛氏謂水皆含異質必以甑蒸取淨水方能消除體內所聚土性鹽類令人變老之質並可免膀胱所致石淋砂淋之證何西池亦云更有輕靈汽化水奇功千古少人知善調充燥證少津液滋水清金更益脾此水雖不易取然亦不可不知夏月湯飲陸麗京謂夏月尋常湯飲須用砂糖梅漿以為能斂真氣助元神而謂六一散之甘草中滿喘脹及多積滯者不宜用滑石利竅表虛者服之則衛氣不固遺漏者服之則精關不守此論與王夢隱正相反夢隱謂夏産後陰虛內熱天令炎蒸雖赤砂糖不可服而謂六一散有祛暑行瘀之功當酷暑之令為産後第一妙方按此兩說一論尋常湯飲一論産後湯飲雖所論不同何至相反若是其實皆不免於偏見豫不取其所用者以為法而獨取其不用者為戒故類記之以見習用之品有利亦有弊六一散不盡宜於夏日赤砂糖不盡宜於産後衛生者不可不知雞納霜雞納霜為治瘧專品清高宗服之獲效由是盛行中國幾於婦孺皆知然豫親見一郭姓患瘧服此後狂熱無汗醫進小柴胡昏迷無知痰喘如鋸死後頭脹如斗面目至不可認識又親見一王姓患瘧服此後狂熱無汗醫進小柴胡湯即發狂而死柴胡固誤然非先服雞納霜一逆再逆其死不致如是迅速據西醫云服雞納霜後能使血行增速皮膚增熱消化增多其未盡善者即使人食管與口並腸胃內皮所藏之液汁俱減少腸胃缺通暢也亦有反致泄瀉者據此實一種助熱傷津之劫劑夏秋瘧疾皆屬濕熱此藥豈宜妄用向日葵西報載俄國鄉人以向日葵治瘧令病者以葵葉臥身下上亦蓋之其病若失俄醫知之奇之取以試驗瀝其精置酒精中或以花葉瀝汁和燒酒製之以治瘧證嘗在病院治病瘧之兒百人中六十一人自一歲至十二歲凡飲此酒者瘧病皆愈按神農本經冬葵子氣甘寒滑無毒主治五臟六腑寒熱羸瘦五癃利小便故聖惠方治痎瘧邪熱取冬葵子陰乾為末酒沖服俄人治瘧之法與此暗合又別録稱葵苗甘寒滑無毒為百菜主其心傷人必效方稱其苗潤燥利竅功與子同可見除心以外若苗若葉若子其甘寒滑之性一也內經云夏傷於暑秋為痎瘧葉香岩云小兒瘧病因暑而發者居多葵性甘寒正是對證之藥又暑必挾濕瘧多屬痰葵性滑利尤能驅濕豁痰更借酒力以行之宜其有效中風喻嘉言論中風創填竅之說自謂本之內經至竅在何處於何補填則茫無著落但據金匱黑散方下注語謂填竅是以藥末存積腹中以為堵塞之計夫藥石入胃與飲食同固無堵塞之理且人身氣血貴乎流通亦斷無可堵塞之處須知內經所謂空竅是指無形之氣言非謂肌體之內實有空洞之孔竅必藉有形之物以補直其罅漏也觀氣學家言冷熱二氣相遇則生風因知中風亦是身中之氣熱而上升則其下必有虛而淺薄之處是為空竅有空竅則不能抵抗外來之冷氣即因其虛而襲之冷氣相遇鼓蕩摩觸而風生焉故金匱治中風採用風引湯及侯氏黑散皆寒熱互用寒以降身中之熱氣熱以散外來之冷氣熱者降冷者散則清明在躬身無餘隙以容邪此即所謂填竅也痿曾見一牛患腳弱牛醫治之不愈死後宰殺則肺已腐爛內經云五臟因肺熱葉焦發為痿躄信然內經治痿獨取陽明者徐洄溪謂指刺法言陰藥則補腎為多丹溪所謂瀉南方則肺金清而東方不實補北方則心火降而西方不虛也然肺熱必傳之胃胃熱又復移肺兩熱相搏遠水或難救近火故張景嶽謂痿證是火邪伏於胃中當治陽明之火邪毋使干於氣血之中則溫熱清而筋骨強筋骨強而足痿以起此雖非經文獨取陽明之正解而理實有可通且痿證有屬痰者補腎不能無弊清陽明則兼能理痰也亦有陽明土虛不能生金而成痿者其證必不能食其脈必弱甚易思蘭立加減補中益氣湯重用人參為補土生金法與景嶽所論正是一虛一實之對子又陳修園極贊紫菀有治痿之功自矜得神農不傳之祕按紫菀清金寧嗽乃是肺藥治肺是痿之本也飲食勞倦東垣謂飲食勞倦所傷皆為不足王安道謂飲食傷又與勞倦傷不同勞倦傷誠不足飲食傷尤當於不足中分其有餘蓋飢餓不飲食者胃氣空虛為不足飲食自倍而停滯者兼有餘不足宜補益有餘宜消導故備息丸煮黃丸感應丸爪蹄散等潔古東垣亦未嘗委而弗用此辨精已而李梴又推闡其義於勞倦中分出勞力純乎傷氣宜補中益氣勞心兼傷乎血宜黃耆建中心力俱勞則氣血俱傷宜雙和散更於飲食中分出飲為無形之氣傷之則宜發汗利小便食為有形之物傷之則損其谷其次莫若消導此辨尤精然皆非東垣之旨也王節齊云補中益氣方論卻謂人因傷飢失飽致損脾胃非有積滯者也故只宜補藥觀此安道李梴所述宜應別論補中益氣湯張景嶽曰東垣補中益氣湯雖為助陽非為發汗然實有不散而散之意故宜於勞倦感寒或陽虛痎瘧及脾氣下陷等證若全無表邪寒熱但見中氣虧甚則升柴大非所宜誠哉斯言乃尤在涇醫學讀書記云古人制方用藥一本升降浮沉之理不拘寒熱補瀉之跡者宋元以來東垣一人而已蓋四時之氣春升夏浮秋降冬沉而人身之氣莫不由之然升降浮沉者氣也其中以升降浮沉者人之中猶天之樞也令人飢餓勞役損傷中氣於是當升者不升當降者不降而發熱困倦喘促痞塞等證見矣夫內傷之熱非寒可清氣陷之痞非攻可去惟陰陽一通而寒熱自己上下一交而痞隔都捐此東垣之學所以能為舉其大歟據此則東垣之方原不當於寒熱補瀉中論之張氏固未窺東垣之深也然守張說於以施治不致大誤守尤說而不善用則不免有誤虛勞虛勞成真必無活理而絶處求生古人未便棄置於是見陰陽之不可偏補也則有調停兩可之法龔雲林治馬氏虛勞自言用藥如彈天平一般不欲偏勝以為偏於補陽藥多則相火愈熾偏於補陰藥多則脾胃不運嚴用和自言其所載方藥性平補柔而不僭專而不雜間有藥用群隊必使剛柔相濟佐使合宜欲用一剛劑專而易效須用一柔劑以制其剛則庶幾剛柔相濟不特取效之速亦可使無後患比較陰陽偏補者高一籌矣見脾腎之不可偏補也則有雙方兼顧之法焉戴元禮云有素經血不足者明知當補腎其素減食又恐不利於脾方欲理脾氣又恐愈耗腎水全一舉兩得之功莫若鹿茸桔皮丸為第一又云要知於滋腎之中佐以砂仁澄茄之類於壯脾之中參以五味黃耆之屬黃錦芳云脾腎俱傷者難以措手兩者並衡卒以健脾為急以脾上交於心下交於腎也要和滋腎之中扶以砂仁沉香壯脾之中參以牛膝菟絲龜板隨時活法以治之庶幾有濟比較脾腎偏補者又高一籌矣然此要皆對於無病者言身本無病但覺精神怯弱不耐作勞診其陰陽氣血則一虛而無不虛並無畸重畸輕盛衰互乘之患東坡所謂尪羸而壽考者即指此種原不必汲汲求治倘欲服藥以冀小康不得不用陰陽兩平脾腎雙補之法要之皆不為治病設也病之作也皆必有所偏勝藥以抹偏斷非模稜兩可者所能蕆事也氣病當理痰痰不去則氣機不暢血病當逐瘀瘀不去則血脈不通四君子湯補氣之主方也而有苓術以化痰四物湯補血之主方也而有歸芎以行瘀古人蓋有以知此矣然猶非其至者也觀仲景虛勞篇黃耆建中湯下注云補氣加半夏三兩又云緩中補虛大黃䗪蟲丸主之此藥此方有攻無補而反以補稱之者蓋一以理痰為補氣法一以去瘀為補血法不補之中有真補焉此正仲景之妙也越人云虛而感寒則損其陽虛而感熱則損其陰生生子云其體虛者最易感於邪氣醫者不知邪氣加於身而未除便行補劑邪氣得補遂入經絡至死不悟如此誤者何啻千萬魏柳州云凡素患虛損人忽有外感宜細審之楊栗山云一隅之虧邪乘宿損又云邪行如水惟注者受之英國醫報謂人身氣血壯旺不易感受風寒其瘦弱之人飲食不節筋骨勞動易為寒暑所侵故虛體何處受寒即何處發病乃常見之事無足異者綜觀諸說可見至理所在不隔中西乃吳醫匯講中載有虛勞論一篇開首便云虛勞之病皆由內傷而外無邪立言如此其理不足觀矣龔雲林云荒年餓莩飽食即死王漢皋云常見茹素之人頓改茹葷皆大病惡瘡死蓋緣氣血失常經隧受壅之故即此可悟病後及久虛人驟與大補其害亦何以異是書謂虛勞不受補者不治其實非不受補不能驟補耳慎柔治損病有煎去頭煎之法正恐驟補壅氣故取淡泊之味非有他妙也內經論病去而濟者必養必和待其來復待字之義微矣醫碥云內傷以有咳嗽為重如肝腎之火其初止病下焦未遽上干也久而炎熾乃及於脾則病重矣魏玉磺云凡損證脈見右左厥厥然如豆按之梗指其病不起以肺金敗也按此似今之所謂肺癆病考醫門法律治癆虛取用燥降收之品殊有合於肺癆之治法咳嗽唾血咳嗽唾血有得大吐而後愈者張子和治一小兒夏月病嗽羸甚欲湧之不可一日因飲酒家人與之酒飲多乃大嘔吐定而嗽止孫東宿述其侄婦唾血因注船大吐痰涎數碗其證再不復萌按此必有致咳致唾之根附著肺胃根不去故一吐而皆豁然惟吐法人不敢用雖以景嶽家傳吐法猶為俞惺齊所譏況在咳嗽唾血之人而可漫為嘗試乎勞傷咳嗽許學士云豫讀仲景書明其法而不守其方此真善學仲景者今人則蹈襲其方而實不明其法柴胡桂枝信乎浪用而開此端者厥為陳修園以修園之書今頗盛行故也修園之最可笑者欲以小柴胡湯治勞傷咳嗽自謂得仲景不傳之祕其實仲景何曾有此修園一生所心服者惟隱菴張氏傷寒淺注多宗其說然張氏有云人皆以柴胡為傷寒和解之劑不知柴胡啓下焦之生陽黃苓散太陽之表熱生薑散陽明之胃氣元是生氣發源在下根氣虛者誤用此湯是猶堰苗助長鮮有不敗此真閲歷有得之言而修園不知何也夫猝病根氣虛者尚不可用況勞傷咳嗽根氣久已不固者乎失血嘉定縣志載史寶治一人冬月鼻血不已令服椒湯其人以為戲也固問其說時方收豆置數粒鬥中而蕩之宛轉上下如意稍緩遂躍出乃謂曰此則君之病矣人之榮衛調和則氣血流通君腦中受寒故血行澀澀則不能歸經故溢出耳非熱疾也竟服胡椒而愈此案可為陽虛陰走及引血歸經二語之鐵證然血證屬熱者多熱則妄行故也因寒而溢百中不過一二故治血證實火折以苦寒虛火養以甘寒自是通常不易之法若用溫熱其誰敢信不知病有始傳末傳由熱變寒亦常有之事黃玉揪云心火之熱即血中之溫氣所化血去而血中之溫氣亡泄是以大失血後心寒栗而戰搖據此是初失血屬熱久而不止皆可變寒不必走由外受之寒也金匱立瀉心柏葉湯兩方一治始傳之鬱熱一治不傳之中寒是血證兩大法門豫曾親見有人用柏葉湯治大失血屢收奇效葛可久治吐血有十灰散用大小薊茅根棕皮側柏大黃丹皮荷葉茜草梔子等分燒灰為末童便酒水隨下嚴用和治崩中下血不止有十灰丸用綿灰黃絹灰艾葉灰馬尾灰藕節灰蓮蓬灰油發灰赤松皮灰棕櫚灰蒲黃灰醋煮糯米糊丸二方皆名十灰皆取紅見黑即止之意而用藥各臻其妙為散為丸亦各當其宜名同而義不相襲腎有瀉法錢仲陽謂腎有補而無瀉後世以為名言其實不合乎事實內經論五臟皆苦欲補瀉未嘗謂腎無瀉也腎本人身之濾溺器摧蕩廢液此為大宗內經謂腎為胃關關門不利則聚水而生病是水邪之當瀉者又謂腎氣熱為骨痿是火邪之當瀉者錢氏地黃丸之丹皮正所以瀉腎火澤瀉正所以瀉腎水是錢氏固未嘗不用瀉法也徐靈胎批臨證指南吐血門有云此等證必有陰火收入腎中終是病根必另放出路為妙如八味丸必有丹皮澤瀉此義可思王安道曰八味丸用澤瀉蓋取其瀉腎邪可知腎無瀉非確論也乃馮楚瞻創奇藏賤府之論謂臟無瀉法而腎更無瀉之法真是瞽說腎藏精內經謂腎藏精證以近人生理學上之研究則藏精者自是睪丸而腎內無精古說是不能成立不知內經之所謂精不在有形之質而在無形之氣有形生於無形無形者生命之根不可損失有形者旋去旋生源源不絶徐洄溪比之於井泉井道不可不革故適度之交媾不但不傷人且於衛生有益而強制則反能為害故曾千里說夢謂好色未必夭壽寡欲未必永年自謂得之於目見豫觀古人記載如孫逢年畜妓妾二百餘人晚年衰憊齒皆齲空虛如樓閣而舊好不衰見長安箋記又吳中孫太卿平生未嘗一夕脫於姬妾飲酒百鐘不醉年九十餘猶日行數十里見蘇談紀曉嵐袁簡齊諸名流皆享青年而好色不變雖由稟賦之奇然亦見此事之果不傷人豫謂此論於古人立言之旨不無刺謬而理之所存不必掩飾也肺痿肺痛肺痿肺癰同出於熱而肺癰為實肺痿為虛以虛治實尚可苟延從實治虛亦見其敗沈氏尊生書於肺痿門內有喘息面浮宜葶藶湯之語夫葶藶峻利可以治肺癰之實而斷不可以治肺痿之虛且肺痿而至喘息其虛已甚與肺癰喘不得臥之屬實者判若天淵故肺癰之喘有用葶藶法尤在徑所謂乘其未集而擊之喻氏所謂先通其壅是也若肺痿之喘豈可一概混施今沈氏於肺癰門內不載葶藶一方而反載入肺痿門內不知何意又謂肺痿特變成癰必兼理膿毒宜紫菀散夫痿者枯也必不能復變為癰即使由痿變癰固已無復生理又豈紫菀散所得治哉郁天下不如意事十有八九是以悲觀多樂觀少腦受其戕而鬱病以起例如寵妾滅妻恃尊凌卑蠢妻掘子勢壓凶逼功戈利奪名色財騙生離死別冤沉思斷鰥寡孤獨僧尼閹嬪以及生而殘廢聾啞瞎瘸男子雞精女子陰實又如嬰兒早開知識或失志玩歡愛久別期許永缺畏憎常遭此等郁證多非為藥石所能醫即感於邪亦較平人為難愈醫存言之綦詳丹溪治病不出氣血痰三者三者之中又多兼郁故立越鞠丸法而易思蘭則專以此加減變化治人所不能治可謂能知其要然淺者可愈深者當不專恃藥物聖濟總録云內經閉戶塞牖數問其情針經臨病人問所便者不治其形治使其形者以病之一二言之隔塞閉絶氣之病也原其本則得於暴憂不治其氣而釋其優可也女子不月血滯之病也原其本則得於心氣之不足使心氣內和則精神莫得而動也頸瘻者風毒之病也每得於愁優思慮之不止使志意和適則氣血莫得而逆也旨哉言乎然此等病證關乎環境之感觸非私人所得自主故黃帝之於斯民也美其食任其服樂其俗各從其欲皆得所願高下不相慕智愚賢不肖不懼於物皞皞熙熙同躋仁壽故其時民皆守朴而合乎道年度百歲而動作不衰高保衡序內經謂黃帝以理身緒餘治天下誠知言哉不寐淮南子曰念慮者不得臥止念慮則有為其所止矣兩者俱忘則至德純矣程子曰張天祺嘗言自約數年自上著床便不得思量事不思量事後須把他這心來制縛亦須寄寓在一個形象皆非自然君實司馬溫公自謂吾得術矣只管念箇中字此又為中所繫縛且中亦何形象朱子曰天祺雖是拙且把定一個物事在這裡溫公只管念箇中字又更生出頭緒多他所以說終夜睡不得老老恆言謂不寐有操縱二法操者如貫想頭頂默數鼻息返觀丹田之類便心有所著乃不紛馳庶可成寐縱者任其心遊思於杳渺無朕之區亦漸入朦朧之境陸定圃云二法中縱法尤妙蓋操則心猶矜持未經恬愈之趣不若縱之遊行自在也特恐稍涉妄想即難奏效尤當寓操於縱為佳豫謂操法即是止念慮縱則不止而自忘縱法固勝宗儒知操而不知縱正所謂止念慮則有為其所止者是以無效陸定圃恐縱法易涉妄想謂常寓操於縱亦似是而非操是一念兩念交竟愈擾不寧矣如恐妄念易動莫如預求一事之最足怡情而耐尋味者為寄想之中心則雖意象千端終不涉於他念如定圃所載一法云每夜就枕後即順斂此心遊思於平素所歷山水佳處任情一往定而能靜入而久之心漸即於杳漠之中不期寐而自寐此以山水為寄想之中心也准此以推不必用操而不致於放縱矣不寐證以病理言之只屬心與腦念慮不得臥正以念慮則心火動而血上流於腦也吳鞠通謂內經衛氣行陽不得入陰之語為一切不寐證之總綱試問陽在何處陰在何處以何處為畔界衛氣何以能入此不能入彼則必茫茫無以以應也豫以意逆志知所謂陽是指腦部言所謂陰是指周身言以部位上下分陰陽也何以言之考西醫謂人不寐皆是腦充血斯塞耳氏以所蓄犬倒懸柱上使腦呈充血現象雖至死猶不睡遂生睡眠不足證而死該塞氏以器械刺擊動物便之不睡毫不間斷至其死而後己解剖之發見多量之血點於腦部故行催眠術者以輕壓迫頸動脈及顳動脈為惟一之方法所以輕減流入腦中血液之分量也因知內經所謂衛氣行陽即衛氣迫血上流入腦之意西醫言人當醒時其精神之活動皆緣腦部受血液之供給及其疲勞則血液循流漸增加於身體外周部以自謀恢復身體之疲勞其時腦中呈貧血現象而人以睡眠因知內經所謂入陰即氣不擾血血液循流之意由此言之痞之與寐只在血之入腦與循流而已韓飛霞用黃連肉桂治不寐者以黃連苦降止入腦之血肉桂辛溫和循流之血一寒一熱一動一靜有挹彼注茲收散逆從之妙用焉仲景酸棗仁湯用棗仁之收斂即配川芎之行散亦所以推蕩血液不使上聚於腦也許學士鱉甲丸羌活與牛膝並用亦得升降沉浮之理又有挾痰不寐者此證尤多以痰能阻陰陽之道路致充腦之血不能循流也故半夏湯溫膽湯又為常用之劑焉仲景治心煩不得臥主黃連阿膠湯虛煩不得眠主酸棗仁湯同是不眠而治法不同鄒潤安曰寐者謐也靜謐無聲也眠猶瞑也泯也泯泯無知也臥猶息也僵也不得眠是能安謐而不能熟寐無知乃腎陰不能上濟心火故治以滋陰不得臥則常多憂亂而不得靜謐乃邪火燔盛縱有腎陰相濟不給其爍故治以瀉火潤安此釋詳人所略録之以見不臥與不眠證情自別不可混而施也胃病治腎脾病治肝脾胃相連治法大異脾病宜升陽胃病宜養陽善治脾者莫如東垣善治胃者莫如葉氏細閲兩家之書於脾胃之治可以得其大概然古人有又隔治法如胃病治腎脾病治肝此又不可不知也許叔微制二神丸治胃弱不能食謂是腎氣怯弱真元衰劣用此為釜底添薪法使腎陽足則胃陽自旺而能進食矣又陳遠公謂多食善飢者胃氣之有餘本之腎水之不足一遇風寒夏暑非變消渴必成痿擦須用大劑六味地黃丸自然氣餒而火息而胃平而熱除是胃病治腎之說也盧不遠治何介甫脾病診其脈兩關軟弱不透於寸曰右固脾虛左則何謂此脾不足而脾用不行也蓋脾之用肝也星家取克我者為用神脾體無肝火為之用則氣血便不條暢運化遲鈍而脾胃轉困矣補助肝火之氣使之揚溢則脾土伸舒精神油然外發雖不治脾實所以治脾方用參苓歸芍陳皮防風甘草按此蓋從東垣脾胃諸方悟出而與肝病實脾之語互相發明此脾病治肝之說也吐酸劉宗厚渭吐酸一證以病機言之則屬於熱以臟腑言之則脾胃受病以內邪言之則痰飲宿食之所為故治法熱者寒之寒者溫之以苦燥之有痰飲者清之分利之有宿食者消之導之驅逐之此合河間東垣丹溪三家之說穿成一線者也豫謂痰飲尤屬此證主腦舉一可該余蓋痰飲因熱而生言痰飲則熱在其中又因脾胃不足而成言痰飲則脾胃在其中更為飲食停滯所化言痰飲則宿食在其中善治痰飲則一以貫之巢氏病源論此證有上焦停痰四字此真握要語也怪病屬痰怪病屬痰此語確有至理王夢隱君以滾痰丸治一切怪病真能於醫門獨樹一幟夫怪病所以屬痰者非痰之自能為怪誕乃人身一切機關為痰所阻運動反常故謂怪耳人身一切機關本自奇妙不可思議飢而食渴而飲倦而息視聽言動隨感而生喜怒悲哀遇境即發亦靈怪極矣而不以為怪者人人如此習以為常也有物阻之則反常而怪以見或精神上之變動或形質上之遷移或發生局部或變現於周身或猝起於崇朝或綿延於數歲表裡陰陽百病叢於一體虛實寒熱一身判若兩人昧者見之以為何物邪氣奇幻乃爾明者察之只是一切機關為痰所阻應行而反止應散而反動應上而反下應降而反升左右參差前後錯亂是以倘恍離奇不可究詰此等證除化痰外別無著手處痰去則一切機關自然復常而無病矣乃張景嶽謂怪病屬痰是庸工不識病能藉以藏拙之語證以豫所經驗知創此說者實有高人之見斷非庸工所能語此也伏氣溫病冷水浴身能使皮膚赤暖精神煥發又憶兒時為搏雪之戲兩手反熱如火乃悟熱為寒鬱而生反抗力之理因得內經冬傷於寒春必溫病之正比例蓋冬傷寒邪身中熱度驟為寒壓不得放散則血內汗穢無從發泄必就身中虛弱之部釀成隱藏之疾延至來春寒氣既退陽熱得令郁之久而發之暑則為溫病矣此人身熱度縮漲之理內經所謂有勝必有復也王叔和謂伏氣溫病是冬日寒毒藏於肌層化而為溫夫寒何嘗有毒且寒已化溫正如大地春回陽和布施何病之有豫直斷之曰伏氣溫病是伏熱非伏寒寒無可伏唯熱遇寒壓則能伏耳東垣稍悟伏寒之非而未達伏熱之理故謂冬傷於寒而成溫者是冬行秋令當寒而溫所致是直以冬傷於寒為冬傷於溫矣此種謬見喻氏反和推許何歟王安道云寒者冬之令也冬感之偶不即發而至春其身中之陽始為寒邪所郁不得順其漸升之性然亦必欲應時而出故發為溫病此深知熱鬱反抗之理者議論高出東垣萬萬矣又按內經人傷於寒即為病熱亦即熱鬱反抗之理後人誤解以為是寒久化熱不知天下只有熱化為寒之病斷無寒化為熱之病熱化為寒者陽氣散亡陰氣獨在如薪燼火滅只剩寒灰故內經有治受熱中未傳寒中之文也苦寒化為熱是寒邪已與身中熱度合化適成不寒不熱之溫度不能為病矣今方書所稱寒化為熱者皆瞽說也傷寒一書千秋聚訟其實亦不外熱鬱反抗之理郁久發暴是為溫病隨郁隨發是為傷寒傷寒初起即宜解散其鬱故有麻桂等法失治必致反抗反抗必致內亂以本身熱度為本身禍患故有白虎承氣等法若外寒與內熱聲勢正等兩不相下則宜和解故有柴胡等法若郁之久而且深則熱度日就衰微漸致無力抵抗而人身悉為寒所踞矣故邪入三陰則有理中四逆等法助熱抗邪此傷寒全書之大旨也夏月伏陰在內夏月常有附桂證故古人有伏陰在內之語然此乃熱度放散太過身中反見虛寒非先有陰邪預伏在內也伏陰不守既幹事理不合且殊足以誤人丹溪乃強為之解曰此陰字有虛之義不得作陰看妄投溫熱語意殊缺明瞭且又不知夏月實有陰證景嶽起而駁之解伏陰是虛寒內伏此雖是正解多未免為古人遂非丹溪遷就為解又似為古人文過此正梅聖愈所云聞氣爭古先也豫亦別有一解取以質諸有道蓋陰者人身之元陰也人身非此元陰無以維身中之元陽無以敵外來之邪陽夏月六陽之氣發越於外大汗淋漓不致亡陽者恃此元陰以維繫之也如煎水然薪燃於下氣騰於上水不竭則氣不盡氣陽也水陰也氣根於水陽根於陰也此陰能維陽之理也炎暑懊蒸流金爍石而人得以安生者恃此元陰以抵敵之也如草木然雨露以溉之水泉以滋之苟根發不絶在烈日中愈見發榮而斷不致於枯槁此陰能敵陽之理也然則元陰內伏正是人身立命之根治暑熱症步步照顧伏陰何嘗不是據要之道不知此解與古人原意尚能遷就否暑古人稱暑暍熱一也沈堯封論之最詳潔古妄分中暑為陰中熱為陽創動得靜得之說東垣以大順散治靜而得之中暑以蒼朮白虎湯治動而得之中熱此等謬見溯洄集辨之已詳王孟英曰動靜惟人豈能使暑氣隨人而判別此又矯枉過正之論豫謂動得靜得亦非全無判別惟判別動靜則可以動靜判別陰陽則不可蓋同是熱邪動得者熱發於外面易見靜得者熱鬱於中而難明至治法則一以辛涼為主海藏此事難知謂動而傷暑者火勝用白虎加人參湯靜而傷暑者濕勝用白虎加蒼朮湯二證同主白虎雖主動靜立說絶無暑陰熱陽之謬見似為智過其師陸粲說聽載洞庭葉翁冬月遭疾幾殆群醫咸以痰火治之王時勉後至獨雲中暑也衆掩口時勉曰諸君莫嗤定是初寒服夏藏曬衣偶觸其熱氣耳問翁果然投以香薷飲而愈按此當名伏暑不當名中暑與夏藏曬衣無涉立論故作矜奇難以傳信後世然據細菌學家之言凡衣服飲食無一不可為其潛伏之巢穴則三伏曬衣冬時觸之而病或亦事之所有乎汗張景嶽言汗有六要用辛散取汗特其一端耳俗醫溫時證陰液已傷而又非汗不解者愈發散則愈不得汗蓋汗之源已涸不落其源汗何自而來故用辛散不得汗者改投甘涼甘寒則反能得汗甚至用冷水亦能得汗景嶽曰冷水稟天一之性甘而不苦大能清熱解煩滋陰壯水凡火盛水涸大渴便結榮衛熱閉不能作汗者最宜用之此說未免太過然出自此老之口實為難得亦可以見至理之不可昧也丹溪云在內為血在外為汗景嶽駁之曰汗為人身之津液津液蒸發再為汗當云在內為氣在外為汗可以氣言不可以血類斯言初若近理然證以生理學家之說汗乃從血液中排出丹溪之言原自不謬但謂汗從血出則可謂汗即是血則不可耳亡陰陽加於陰則為汗故汗多是亡陰證陰亡不止然後陽乃隨之如薪燼則火熄油干則燈滅其理一也今人不知汗多是亡陰又不知亡陽是陽隨陰亡往往誤治故徐洄溪有亡陰亡陽之論並申明辨證之法云亡陽脈微汗冷如膏手足厥逆而舌潤亡陰脈洪汗不黏手足溫和而舌乾其救治之法則云亡陽之藥宜熱亡陰之藥宜涼數語寥寥明白簡捷真有功後世之言然亡陰之用涼藥是正治法無容躊躇者也亡陽之用熱藥乃權宜救急之法不可過劑過劑則前功盡棄蓋陽不自亡以陰先亡而陽無依耳故亡陰是本病陽既回而陰不復則方回者亦必復去如浪子思家而已無家可歸矣故洄溪治蘆墟迮耕石暑熱壞證先用參附回陽陽既回即以西瓜啖之更飲以清暑養胃之劑而愈非深契造化之微者不能知也然此法亦本之仲景按傷寒論證象陽旦誤用附子而亡陽者更飲甘草乾薑湯回其陽重與芍藥甘草湯養其陰後與承氣湯止其譫語此中奧旨未易窺測喻嘉言陰病論云陽既安堵即宜休養其陰正從此等悟出若洄溪則又神而明之者也亡陽有兩證有陰竭陽厥有陰盛格陽右所論者是陰竭陽厥故治法如是若陰盛格陽則又不在此例痙吳鞠通痙瘛辨謂痙病為寒瘛為熱以金匱治痙之法不合今人之用故強分二證謂仲景只言痙病未嘗議及瘛病夫瘛者收引之謂金匱痙病門內明明有身蜷足蜷之證不得謂非瘛病是金匱之痙本兼瘛言其方則不適於今用者蓋古方今病本難盡通此不必為仲景諱也吳氏之辨徒覺詞費喻氏於痙病內分出陰陽二證謂三陰三陽皆有痙病引靈樞陽病不能俯陰病不能仰之說以為陰陽二痙之辨謂仲景所云項強脊強即不能俯之陽痙身蜷足蜷即不能仰之陰痙謂王海藏所云低頭視下肘膝相構者亦正不能仰之謂不得誤認為陽明此說似為近理蓋人身筋脈熱則伸張寒則收縮陽痙之不能俯熱則伸張之象此說與吳氏正相反吳氏之所謂痙正是不能俯之陽痙所謂瘛正是不能仰之陰痙循吳氏之說於陽痙用剛劑陰痙用柔劑豈不大誤惡寒傷寒論有熱深厥亦深之說此熱鬱於裡不得外達故也大凡熱鬱於裡者其外必呈大寒之象不特傷寒為然雜症亦無不然徐嗣伯治房伯玉服五石劑患夏月常復衣以為是伏熱於冰雪大盛時以冷水從頭澆之盡百餘斤俄而起坐曰熱不可忍乞冷飲以水與之一飲一升病愈後冬月猶單衣體更肥壯丹溪治周進士惡寒雖暑亦必以綿蒙首服附子增劇脈滑而數斷為熱甚反寒乃以辛涼之劑吐其痰繼以防風通聖散飲之愈戴元禮治朱文仲長夏畏寒身常挾重纊食飲必熱如火方下咽微溫則嘔診其脈數而大且不弱斷為火極似水先以大承氣下之復以黃連導痰湯益竹瀝飲之竟瘳張子和治一婦身冷惡寒六月重裘猶覺寒澀澀不已脈如橫繩有力與以涼布尉心以新汲水淋之其人呼叫殺人猶不止連灌三四十桶大戰汗出昏困一二日而所苦皆除原病式曰病熱而反覺自冷實非寒也古人遇戰栗之證有以大承氣下燥糞而愈者明是熱證耳丹溪曰痼冷之病豈非身惡寒而口喜熱之病耶殊不知溫痰積中抑遏陽氣不得外泄身必惡寒又曰惡寒非寒明是熱證觀此則惡寒屬熱毫無疑義若葉天士醫驗録所載卻有真寒之證然真者反不多見耳瘧內經論瘧大旨論得之於暑熱暑熱之邪先伏於營分令人汗空疏腠理開猝遇秋涼與淒倫水寒閉郁衛分暑熱之邪不能隨汗而出則瘧病以成據此是瘧邪本有兩路分據營衛在衛者水寒之邪衛分之邪入與營爭則寒營分之邪出與衛爭則熱兩邪交爭以人身為戰場以營衛為根據而主客之勢又自不同暑熱先據營分於勢為主水寒後據衛分於勢為客故水寒之邪其來雖暴猶易解散暑熱之邪盤踞已深常虞瀰漫治瘧者當分頭剿撫而尤以暑熱一路為重要古之醫者以小柴胡湯治瘧柴胡退寒黃苓退熱是雙方和解之法然往往不效且增煩躁發狂等證者蓋寒邪易去柴胡已足奏功暑邪之深黃苓尚難勝任也況中有甘藥更為暑病所忌南醫拼去此方不用其治瘧也一以清暑為主而於水寒之一方面又似拋荒故收效每多遲滯蓋於內經衛有水寒營有暑熱之理未嘗深考自來注內經者亦未能標出曩現王孟英溫熱經緯謂傷寒有五瘧亦有五溫暑時瘧不可作傷寒正瘧治豫初以為名論繼而思之亦影響語耳安有所謂正瘧時瘧時瘧有豈全無寒邪耶至闢柴胡不宜用亦不盡然且柴胡固是傷寒藥然王氏醫案每用白虎加桂枝桂枝獨非傷寒藥乎可見此證本是寒暑夾雜治宜雙方並進桂枝在所不廢柴胡豈宜拼絶但問於暑熱一路所配之藥力量如何黃芩配柴胡固遠遜白虎配桂枝也痢潔古治痢芍藥湯其妙用不外河間所云行血則膿血自愈調氣則後重自除兩語誠痢門佳方也深師有七物升麻湯用升麻歸芍連柏桂心甘草與此大致相同惟此加大黃而以黃芩換黃柏檳榔木香換升麻分兩則芍藥倍於他藥故以芍藥名湯其注重全在芍藥深師方七味皆半兩而以升麻名湯其注重全在升麻芍藥升麻皆痢門要藥芍藥湯人多知之七物升麻湯則罕有知者按鄭胄師耳新載朱郁儀母患滯下公方同病骨立猶強起乞以巳年增母算夜夢天神來告曰久痢氣陷當於香連丸加升麻少許因如其言一服而愈則升麻固久痢氣陷者所必需矣繆仲淳治痢每用緑升麻稱神效云瀉瀉為寒言其常也然當辨其色秦皇士云大便於結知其熱矣然大便滑泄黃色為熱人多忽之又當辨其痛否戴元禮云凡瀉水腹不痛者是濕也飲食入胃不住或完穀不化者是氣虛也腹痛瀉水腹鳴痛一陳瀉一陳者是火也或時瀉或不瀉或多或少是痰也腹痛甚而瀉瀉後痛減者是食積也據此二說則瀉不皆為寒可知且二說尚有未盡也原病式云泄症完穀肉消化不論色及他症便斷為熱蓋寒泄穀肉消化者未之有也然又有穀肉不化而仍非寒者錢氏吐瀉爭功一案米穀不化治以石膏又即原病式所謂火性急速傳化失常之故也更有肝風傳脾下利完穀者呂滄州用小續命之案可法也又書云暴泄非陰久瀉非陽久瀉固屬寒矣然易思蘭治瑞昌王妃數年不愈斷為火鬱而用黃連蘇沈良方治久患脾泄有生薑黃連一方冷廬醫話載有三十年不愈之瀉用滾痰丸三服頓愈然則久瀉非陽又不可盡拘也食厥葉天士醫驗録載食厥證甚多有時而暈倒口眼歪斜手不能提似中風者有猛然昏倒口內必叫一二聲似羊癇者有僵臥不醒似邪祟者有臨臥忽爾語言混亂揚手擲足目睛上竄牙關緊閉手足俱冷妄言見鬼者有每夜至半更時輒死去胸前有塊拱起作痛夜熱晝退手心更熱者凡此種種非有真知的見鮮不為病所惑天士獨以氣口脈盛或有關之前獨搏或寸口弦滑為斷其用藥總不外厚朴山楂麥芽神麯枳殼木香陳皮半夏炮薑砂仁之屬甚者加大黃下之全書議論並不甚高惟於此證殊為詳備亦獨得之祕也故表而出之馬脾風小兒暴喘俗名馬脾風初虞世曰馬脾風者暴喘而兼脹滿也大小便祕宜急下之用牛黃奪命散後用白虎湯平之患在百日內者不治牛黃奪命散白醜黑醜各一兩半生半炒川大黃檳榔各一兩共為末三歲兒每服二錢冷漿水調下涎多加膩粉少許吳緩曰馬脾風宜用辰砂二錢半甘遂一錢半輕粉五分共為末每取一字以溫漿水少許上滴香油一點挑藥在油花上待沉下卻去漿水灌之即名馬脾風散此方甚妙也醫宗金鑑用五虎湯及一捻金下之清道光間江陰吳俯恬名士瑛著痧疹論自述少時見一小兒患溫邪咳嗆漸至喘促胸高聲如曳鋸初不識為何病有周某云莫非馬脾風乎詢伊方治則云忘之囑其查閲方書竟未查出越兩日症遂告敗吳由是勤求古訓久之乃得大驚散牛黃奪命散四將軍散等方筆之於書然效否吳初未識也近來此症甚多為小兒科第一惡症多由溫邪而起其症外視初不凶惡如金鑑所云兩脅煽動陷下作坑及神氣悶亂等症初俱不見但喘促鼻煽痰聲淥淥而已醫者不曉視為尋常之症漫然與方竟有不及終劑猝然告斃者知者或遵用金鑑五虎湯以為平穩可法然多不效豫曾用雄黃解毒丸救治兩小兒其餘能自作瀉者止用洋參石膏射干等劑多能立效以肺熱移於大腸故症勢稍緩也按此症在西醫書中即是氣管支炎為普通流行病大人亦有不獨小兒小兒多危險者以其氣力薄弱不能鼓痰外出必將氣管閉塞而死故其死最速誠知此症由於氣管支炎其死由於弱不能湧痰則於治法思過半矣霍亂王孟英霍亂論專主寒涼力言姜附為必不可用今世多宗其說以視昔之執傷寒法用五苓散理中湯者相去甚遠然近有一種癟螺瘟吐瀉轉筋四肢冷過肘膝十指螺紋深陷用孟英法無一應者惟白通加人尿豬膽汁湯及益元散可救二方皆用姜附而以苦寒為佐蓋非姜附不能回陽而非苦寒則又格拒不入也見此症之年每與熱霍亂並見其症亦口渴喜冷飲寒熱真假彼此極易混淆宗孟英法者治熱霍亂輒效而於癟螺必無效執傷寒法者治癟螺或得半效而與熱霍亂無不失手然熱霍亂不似癟螺之險惡即刮刺榻洗取嚏飲冷諸法皆能取效不必讀霍亂論者始能救治也若癟螺症當孟英著論時尚未有此故霍亂論在今日非完備之書也按癟螺與霍亂實非兩症但有陰陽之分輕重有別霍亂症在陽經其勢為輕癟螺症在少陰厥陰其勢為重霍亂之吐利厥逆乃由陽經傳入厥少與傷寒傳經熱邪同例癟螺竟是陰寒直中中於少陰白通加人尿豬膽汁為主中於厥陰當歸四逆湯為主昔山陰田雪帆著時行霍亂指迷謂霍亂轉筋是寒中厥陰宜用當歸四逆加吳茱萸生薑湯及艾灸關元穴是真先得我心冷廬醫話詳載其說而孟英譏其紙上談兵過矣至謂果系寒犯厥陰當用吳茱萸湯不當用當歸四逆通血脈以舒肌表則是此君於厥陰病機及治法並未究心豫嘗謂傷寒厥陰病是靜脈中病少陰病是動脈中病少陰病篇白通湯通脈四逆湯是溫通動脈血而調整其循環厥陰病篇之當歸四逆湯是溫通靜脈血則調整其循環霍亂之在厥陰手足青紫遍身青筋正是靜脈血停留之象正宜歸芍桂心木通等溫通血脈血脈一通危象自退此豈吳榮萸湯所能比擬近時西醫治此用鹽水注射正以鹽能助血流通也古書治霍亂亦用鹽滷淋洗摩擦及炒鹽包尉心腹但知有此法而未明其理孟英妄解以為鹽能散風火化濕熱真不值一笑也分元年即清光緒九年德國特派醫士告格赴埃及印度查究霍亂之症始知係一種狀如螺旋之微菌據於病者之腸內蘊毒而成者口糜泄瀉金鑑載口糜泄瀉一症為古書所無其症上發口糜下瀉即止泄瀉方止口糜即生謂是心脾移熱所致口糜發時晚用瀉心導赤散滾湯淬服下泄瀉時早晚用參苓白朮散糯米湯服若小便甚少下利不止則用茯苓車前子二味等分煎湯代飲若服寒涼藥口瘡不效則為虛火上泛用理中湯加肉桂大倍茯苓降陽利水降陽而口糜自消水利泄瀉自止可並愈也豫見一人患症與此同醫多不識其人年五十餘性急多怒豫斷為肝陽所致肝陽上逆則生心火而口糜肝陽下郁則犯脾土而泄瀉見症在心脾而上下相移之故則全在肝治肝則心脾皆在治中似較金鑑為得要領為用黃連麥冬燈心草防風根小劑煎湯代茶服之良已後又因怒舉發有吳醫某以技自薦其人信之當糜時姿與寒涼口糜止而瀉不已改用溫補止澀調治兩月如金鑑理中加桂之法彼雖未見而用藥當與暗合且與附子並進卒至瀉止而惡寒特甚時在冬月醫疑挾感用豆豉發汗而汗不出繼用麻黃一劑竟遂漏亡陽而逝咎醫用麻黃之誤而不知其誤早在附桂附桂熱藥服之而反寒此正仲景所謂熱深厥深之理病本在肝肝為厥陰故見症如是此時熱伏己深用發散之劑煽動其焰遂一發而不能制理固然也瘧疾日輕日重門人治一瘧疾一日輕一日重來問於豫豫曰此寓意草所有蓋因時日乾支之衰旺與人身相關甲丙戊庚壬為陽乙丁已辛癸為陰喻氏所治之症值陽日助正而邪不能勝則輕值陰日助邪而正不能勝則重固以理中湯運轉胃陽而愈此他書所未道及正可仿之施治因詢此人瘧疾乃陽日重而陰日輕又詢其發之遲早則重者發於午後輕者發於日哺豫曰此與喻氏所治適得其反喻氏所治得之飢飽勞佚傷其陽會故症治如是此人當是陰分素虧陽邪傷陰故陽日助邪而重陰日助正而輕詢之系吸鴉片者陰虧可知陽日重而瘧作反早陰日輕而瘧作反晏者蓋濕熱合邪陽日則濕隨熱化有宣通之機故發之早陰日熱為濕伏有閉遏之象故發之晏實則重非真重輕非真輕也門人悅服因詢治法豫曰此非一方可了憶醫醇𪒟義治瘧法初發寒邪用辛溫解散次發熱邪用辛涼解散此法令未有行之者而此症正宜仿此用藥當發重之日預服甘寒之劑以清暑使重者轉輕發輕之日預服苦燥之劑以化濕使晏者轉早如此可以必效門人依法治之果應手愈逾十餘日又匆促來問言此人愈後飲食已增能出外遊行矣今不知何故忽身汗昏督不能自支勢甚可危豫曰此症愈後本少竹葉石膏湯一劑故有此變可急用此湯加浮小麥與服後果一劑而平
