body:
  text: 谷蘇醫話卷二膨脹金匱水氣篇有五水之名而無膨脹一門後世方書分水腫與膨脹為兩證而無石水正水之目不知正水即水腫石水即膨脹正水自喘病涉於肺石水腹滿不喘病涉於肝內經謂腎肝並沉為石水病源謂石水引兩脅脹痛上至肺胃脘則死喻氏據內經病源之說謂石水即脹病其言至為有理今人列脹病於水病外不知脹病必有水不如競稱石水之為當也西醫內科全書謂凡水膨按病源而分輕重且多緩起若因肝體縮實而起者有數月之久須先考其肝病之源與病勢方能定其愈期若因某臟腑略失功用而起者則一兩個禮拜之期自可成膨狀其愈期無因肝而起者之久約數個禮拜自可全愈或因心或因肺因肝有患而起者則病期不能預料屬肝部尤為特險云今中醫所稱之膨脹病即因肝有患而起之水膨金匱所稱為石水是也石水金匱無方後世如三因禹餘糧丸丹溪小溫中丸直指人參芎歸湯寶鑑見蜆丸等方多肝經藥足補金匱所未備但亦未必皆效耳蠱脹張介賓謂膨脹中空無物亦必有水非真無物多屬於氣蠱脹中實有物非蟲即血血蠱證徐靈胎以唐人法用肉桂黃連人參大黃五靈脂為劑當是此病正方又治血必先順氣有氣結血聚六脈弦滑而數者先用蘇合香丸俟腰作痛乃以硝黃逐之此項彥章法也又有大腹消後左脅露出病根一條如小枕狀當以法湧其瘀血更從大便泄之其根始去此喻江西法也蟲蠱之最駭聞者如赤水玄珠所載天生堂嫂病膨三載死後火葬腹忽響如炮見蟲從腹中爆出高二三丈許燒所之天為之昏俄而墜地細視皆蛔也不下千萬數大者長尺余蟲腹中復生小蟲多則十五六條或十數條或五六條其蕃息若此又治王氏子腹脹大脈滑數唇紅腹痛又多嗜肥甘因思諸凡腹痛者唇色淡不嗜飲食今若此得非蟲乎授以阿魏積塊丸下蟲數十三下而愈水腫冷廬醫話載湖州胡氏子患水腫有教以黑魚一尾入綠礬腹中燒灰服之服後腹大痛遽死按此本是古方而難信如此曾親見一人水腫諸治不效或教服雞屎醛驟愈而兩目至夜不能視物此證俗名雞矇眼故疑為服雞屎之故不知然否按高鼓峰云有一種食臌初起必先雀目起翳醫家不識只治眼目不知乃是臌之根也據此則知其證當是食雞屎醴原非正治故病去而根不去耳後聞其證復發而且反愈始信鼓峰之說不誤此事殆從經驗而得未易以學理解釋也疸徐洄溪言疸之重者有囊在腹中包裹黃水藥不能入非決破其囊或提其黃水出淨必不除根此等病當求屢試屢驗和平輕淡之單味藥治之專持古方竟有全然不應者按治疸單方東醫寶鑑羅列最多徐忠可治黃疸見其偏於上者令服鮮射干一味斤許而愈見其偏於陰者令服鮮益母草一味數斤而愈又凡有黃疸初起非系谷疸酒疸女勞疸輒令將車前根葉子合搗取汁酒服數碗而愈此殆所謂和平輕淡之單方也予按人身惟膽汁色黃黃疸必關涉膽經而方書多未提及何與至洄溪囊裹黃水之說予不敢信當質諸解剖家飲一溲二內經有飲一溲二之肺消證不過言其溲便之多耳且證屬移寒其人必不多飲飲不多故入飲一溲倍出故曰溲二此一尋常症候不足奇也自後人將此條列入消渴一若大飲大溲較之金匱所稱飲一斗小便亦一斗之消渴證尤重殊為可笑不知善食形瘦日消善飲口燥口渴內經只云肺消不云消渴何得混入消渴一門何西池醫碥固已辨之矣繼得王潛齋說尤覺爽然潛齋云飲多溲多其常也不可謂病必其肌漸瘦削始為消渴雄自幼至今非酷暑不飲茶湯唯浸晨必以淖糜為早膳而晝夜小溲五六行既清且長較一日之所飲奚止倍出體氣虛寒者固然設泥移寒之說何以至今無恙乎嚏嚏非病也而能去病蓋嚏中有發散意與吐略同仲景所謂客氣內入嚏而出之是也劉河間謂外風欲入內火推拒格故發為嚏有嚏則風邪隨氣而散不能傷於經是以傷風有嚏為輕高士宗謂時病將痊則嚏嚏則經脈流通病邪自散又厥證得蘇則嚏嚏則從陰出陽逆而復順中風搐則經鼻取嚏亦是開通經脈之意按素問遺篇刺法論黃帝問五疫之至如何可得不相移易岐伯曰不相染者正氣存內邪不可干避其毒氣天牝從來復得其往氣出於腦即不邪干天牝者鼻也邪自鼻來復從鼻往即搐鼻取嚏之意今人患霍亂倉猝不可得藥用開關散吹鼻取嚏往往有效正與天牧從來復得其往之意合惟世雖有此法不知實本內經耳又有久病陽不宣布不能得嚏者當搏一嚏以取快法用人參乾薑五味菖蒲薤白半夏橘皮紫菀桔梗甘草煎服立效此王孟英驗案又有中寒家清涕善嚏數年不愈當以藥止之法用鍾乳溫肺人參溫中黃耆實衛鹿茸固髓黃牛腦和丸空腹服之即愈此張璐玉驗案內經金匱雖言嚏欠元因而無治法錄此二案以備法程憂疾之疾昔桓虞有疾在腠理而不知遂至於大而不可救此越人所駭嘆而為諱疾忌醫者之同戒也然或矜持太過疾未至而憂其將成已至而優其將深且愈而憂其復作則天君一亂正氣先餒不病於病反病於憂富貴人偶有微疾百計矜持而神氣不能驟復者憂疾故也貧下人不以微疾介懷疾亦不能為患者忘及故也李瞻治一人目腫火炎而性最卞愈躁而疾愈熾非藥可下瞻謂曰子目易愈此客火將流毒於股不十日必暴發其人習聞瞻名遂日以股為憂至三日以一藥而愈股亦無恙或問其故瞻曰性暴人患疾每欲急愈火上攻目移其意以憂下即易療今之患瘧疾者謂有瘧鬼每於未發之前避匿他處如高力士至功臣閣逃瘧真愚妄可嗤然竟有因逃得愈者蓋多其憂疾忘以憂鬼而反與疾相忘也又截瘧用符咒及諸造作亦能有效蓋其證本輕而又冀有神護正氣驟旺積憂頓損也巫醫亦能醫疾者蓋假神護之說有以釋其憂也醫之名高難致者往往聆馨頦頓喜而疾遂衰其半亦有恃無優之效也又有病至危篤知憂之無益甘心待死者其病恆不死慼慼然惟恐其死者則恆不免於死淮南子曰執獄牢者無罪當死者肥澤刑者多壽心無累故也然則為醫亦多術矣陳藏器曰以和養心以禳去災以言笑暢情懷以無為驅滯著豈專於藥石針灸之閒哉疑疾之疾疾有真者有幻者幻者由心造杯弓蛇影往往弄假成真北夢瑣言載唐時京城醫者治一婦從夫南中曾誤食一蟲常疑之由是成疾頻療不損醫者知其所患乃請主人姨奶中謹密者一人預戒之曰今以藥吐瀉但以盤盂盛之當吐之時但言有一小蝦蟆走出然切不可令疾者知其誑給也其奶僕遵之此疾永除萊蕪縣誌載朱包蒙治馮某迂腐善疑患瘋痛自謂瘡毒積憂成疾公曰然投藥發泡十餘其疾頓痊或詢之曰是本非瘡既疑是瘡不令實見瘡形疑不釋也儒門事親云昔聞山東楊先生治府主洞泄不已楊初未對病人與眾人談日月星辰纏度及風雷雲雨之變自辰至未而病者聽之忘其圊楊嘗曰治洞泄不已之人先問其所好事好弈者與之棋好樂者與之笙笛勿輟蓋疑疾而疾至忘疾而疾亦旋已豈惟洞泄然也莊子齊桓公田於澤見鬼而反誤治為病數日不出齊士有皇子臺敖者以為是名委蛇見之者霸桓公輾然而笑不終日而不知病之去也王子近思錄有人眼病常見獅子伊川先生教他見獅子則捉來其人一面去捉捉來捉去捉不著遂不見獅子有人自畏尖物明道先生教以室中率置尖物使之見熟而知尖不刺人也則知畏者妄而不復畏矣此與張子和治驚同一妙用夫病變萬端生於疑而成於憂者何限醫者病者不知以理勝之而徒恃湯藥抑未矣經水經水先期主熱後期主寒常理也而趙養葵云有不及期而無火者有過期而有火者不拘於一定予按不及期而無火者氣虛不能攝血趙氏謂宜補中湯者是也過期而有火者因熱耗血血少故行遲蔣仲芳治姚氏婦之證是也經來紫黑屬熱淡白屬寒亦常理也而趙養葵謂色黑亦有虛寒葉天士謂血黑亦有風寒外乘者沈堯封謂嘗見元和一婦經水過期而色淡服肉桂藥而致死王夢隱謂色淡竟有屬熱者經閉陳修園治朱紫坊黃姓女經閉泄瀉便後帶血主金匱黃土湯以赤石脂易黃土乾薑易附子每服加生鹿茸五錢連服八劑瀉如故而經通又五劑瀉血俱止以六君子湯加乾薑收功因引喻氏治楊季登女經閉用龍薈丸一案為一虛一實之對子備載所著女科要旨中予按血枯經閉無血可行者方為真虛修園及喻氏所治兩證只有寒熱之分並無虛實之別喻氏所治是血熱心氣不得下通東垣所謂陰為陽搏潔古所謂當瀉心火者即是此證觀其汗出如蒸與倒經正同一例蓋汗從血液中排出血虧焉能作汗血熱是以汗多故喻氏謂此證可療處全在有汗折以苦寒應手輒愈亦即東垣主用涼血潔古先治心火之意修園所治是血寒凝澀澀則不能循經而從他道錯出與置豆鬥中勤蕩宛轉稍緩即出同理詳見二卷失血門觀其無血行經便復有血其非真虛可知遇喻氏必曰此證可療處全在便血修園不知故用藥則是議病似遜夫同一經閉一則血熱而從汗泄一則血寒而從便泄此即西醫所謂代償性月經也故病皆可起設真虛而無血可行非大補其真陰不可若修園所用之藥又豈虛證所宜又按婦人有經閉不行而不為害者暗經不在此例有雖按月勉強一行而不為吉者此事惟王潛齋知之他書罕能道及卵珠女子受精成胎全在卵珠卵珠生於卵巢而外有胞每月熟一個為常度亦有成熟兩個者月經之行即為卵珠成熟之徵候月經將終則為卵珠裂胞而出入輸卵管將卵中所藏胚珠為裂脫出預留一隙則以為精蟲攝入之路然後前進而達於子宮造成一種巢狀約留六日乃至十日在此期內一遇精蟲闖入即吸收而營養之是為妊娠若期內不遇媾合則卵珠由子宮口部脫出而下膣腔不能成孕矣中醫不知卵珠之說故論收胎多主男精女血不知血是養胎者也今竟說成精血混合而成胎豈非謬誤又如褚氏以精裹血血裹精分男女東垣以精勝血血勝精分男女此等尤為無稽卵珠成熟而受精則為妊娠故婦人無子不得不注意於卵珠之營養與分泌卵珠位於卵巢而藏於濾泡其營養一以濾泡內所含之白液為主白液吸盡則卵珠成熟濾泡外壁通過多數微絲血管血管充溢而破裂則胞乃緊滿而突出於巢之表面卒乃破其被膜乃巢之表層而分泌卵珠其分泌正為月經潮來子宮黏膜剝脫之候而卵珠即由輸卵管以達子宮與黏膜之新創面相附著以受精蟲之攝入由此觀之卵珠之營養在白液卵珠之分泌在血液以中醫學理解釋之則白液者水也血液者火也水為體而火為用壯水益火治各有宜古方治無子多主虛寒而用溫熱其方之最佳者為秦桂丸蔭丹溪力言其誤予謂此方用桂附薑辛等味力能鼓盪血液而助分泌之用以治血寒凝結卵珠不能裂胞而出者可以取效若血熱則非所宜又況白液不足卵珠失其營養者更何以概施妊娠婦人受妊有難以常理測者經不通不能受妊此常理也然汪石山治婦產後年餘經水不通首夏忽病嘔吐手指麻痹聲啞而噦醫皆視為風病汪診其脈細而近滑尺按不絕便斷為妊娠惡阻治之果愈又有一生不至孕晴經者是經不通亦受妊也妊後經即不行亦常理也然薛立齋治一婦妊娠三月其經月三五次兒大方止張景岳治一婦妊娠經三月方止王孟英治黃嶺吉室人妊後四月經始停娠始顯娩如期又有月月行經產子者書名胎盛俗名垢胎是妊娠亦能行經也能受妊者必無病亦常理也然江篁南治遊讓溪夫人病新愈月餘即受妊汪石山治二婦病鼓脹大如箕垂如囊無藥可救後皆因產而亡王孟英治金碗香媳平產後營分不攝季夏漸愈仲秋診其脈已有孕矣治石誦義室脘痛甫愈適汛逾期亦斷為孕已而果然果病體虛體亦能受孕也凡若此等理則反常在事則恆有當其胎孕未顯求診於醫苟非指下了了安能見有於無此外更有血欲凝而暴竭證初非有脈可驗醫不知此妄投湯藥此犯景岳暗產之戒又女科輯要載錢鵠云之室得厥症治愈後生一子計其得病之時乃受胎之初月錢彬安之室得咳嗆涎痰脈細數之症吳門葉氏謂是百日勞不治浦書亭取六味丸料與服病愈而胎始顯汪石山診一婦孕五月右脈大於左脈謂是女孕彼則喜曰我男胎矣往歲有妊尊甫先生診云亦謂右脈浮大當是女子孕後生男今妊又得是脈可知為男矣後果生男王孟英診周光遠妻右寸關忽見強大滑疾上溢魚際詢知汛愆半月曰妊也並可必其為男聞者疑之王曰肺象乎天今右寸脈強滑上溢豈非本乎天者親上耶後果舉一子脈書之不可泥如此過用不產病源論妊娠過年不產由挾寒冷宿血在胞而有胎冷血相搏令胎不長產不以時予觀書傳所載古之偉人如符堅則十二月生劉朔則十三月生帝堯及昭帝則皆十四月生劉聰則十五月生又產育寶慶集云婦人懷胎有七月八月九月而產者亦有經一年至二年三年五年而後產者蓋人之生陰注陽定自有時日不可改移今必拘以十月似為未盡據此則病源云云未為通論證諸生理學家之說胎兒至第四個月男女已別爪發始生至第七個月頭毛密生睪丸漸下瞳膜漸消此時產出之兒已能續其生命故七月生子固不為異至遲產延至十數月者證以西說亦所恆有惟遲至三年五年實屬駭聞然造化之奇每有不可以常理測者蕭慎齋目為不經則過矣又按潘溫叟治一孕婦孕五歲一婦孕十有四月皆未育公視曰疾也作大劑飲之孕五歲者墮肉塊首余枚有眉目狀孕十四月者墮一大蛇而皆愈許裕卿治一婦孕十七月不產問諸情況果孕非病但云孕五月以後不動為主丹參一味令服兩旬余胎下已死而枯張石頑治馬雲生婦孕十三月不產脈來微結為處十全大補湯服至二十劑而下胎枯色白據此則過期不產有怪胎枯胎臨證又不可不審也產後奇證丹溪立齋醫案有產後產下一物如手帕者有下一物如合缽者有二歧者有出肉線一條者有子宮損落一片者其在人身果系何物丹溪立齋均無確見然究其致此之由則氣虛血脫四字足以賅之故立方處治不過參耆歸地加以升提收澀之品所謂知其要者一言而終也丹溪有產後當大補氣血雖有餘證以未治之之論殆為此等而發當時得心應手之餘不覺有此滿意語耳又竇夢麟治一婦因骨梗嘔吐吐見一物脫出口外二尺余形如小腸闊五分內有未化食物或云即是小腸而腸不能出於口竇氏謂是肺系而肺系內不能容食雖經治愈理終不明生化湯會稽錢氏生化湯自景岳而傳陳修園謂不拘半年正產雖平安無事俱宜服近世所傳傅氏女科偽書於產後門專以此方加減至於鄉僻之區不及延醫往往照方撮劑以之行瘀亦自有效獨王夢隱起而闢之立言未免過激然亦不可以少此一說考原方本有熟地即四物湯去芍藥加桃仁乾薑甘草其去芍藥者蓋泥於酸寒伐生氣之說然熟地陰膩弊更甚於芍藥其乾薑一味在制方者蓋取陽生陰長之義正是得意之筆然當亡陰血虛孤陽獨盛之時原無取乎乾薑之生陽而正不可少芍藥之益陰用方者不可不知產後鬱冒金匱產後篇首列小柴胡湯陳修園醫學三字經竟云小柴胡首特筆居然以小柴胡為產後第一正方錯解古書誤人不淺茲備錄金匱原文而解釋如下原文云產後鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以產婦喜汗出者止陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之按原文當分兩段解自產婦鬱冒至陰陽乃復句為一段是論產後鬱冒之正文大便堅以下為一段是以鬱冒症之大便堅嘔不能食另詳外感證治蓋謂鬱冒證之大便堅嘔不能食自宜損陽益陰不必拘拘治嘔及通大便若由外感風寒而得之大便堅嘔不能食當以傷風治法先以小柴胡湯止嘔嘔止而大便仍不行再與大承氣下之即傷寒論先與小柴胡湯以解外後以柴胡加芒硝湯主之同一用藥之例且病能解食七八日更發熱云云玩一更字可見此證先必發熱無汗病解是得柴胡發汗而解其為外感風寒無疑與鬱冒證之自然汗出不發熱者不同惟嘔與不便與鬱冒相似故類及之以見實證從實治不必因產後而顧慮也然則鬱冒無治乎馮夢瞻雲頭汗過多謂諸症亡陽若產後陰氣太虛正喜其亡陽與陰齊等此薛氏之謂可勿藥而愈也薛氏此言似有病語實則本諸金匱產婦喜汗出一語此喜字即勿藥有喜之意間有不得不服藥者不過養血滋陰其方自可意會仲景不言者無庸言也孰意不言後人意遂不知至吳鞠通氏始稍有發明亦可見古書之難讀矣旋覆花湯金匱旋覆花湯治婦人半產漏下自來注者皆不曉其義或遂疑為錯簡以方中無溫補藥也惟尤在徑云肝病不宜溫補解其鬱聚即所以補行其血氣即所以溫王晉三注云旋覆花湯通劑也治半產漏下及通因通用法二注頗悟立方之旨蓋方為氣實血熱者立其治半產漏下未必果能勝任以之調理氣血實無出其方右者旋覆旋轉大氣全蔥通調營氣新絳引氣藥於血脈中以奏功絕不用歸地等陰膩之品而實為女科第一妙方惟葉天士頗知採用蓋深悟氣為血帥之理也晉三自謂嘗於此方採用新絳青蔥加理氣血之品移治鬱結傷中胸脅疼痛等證予謂此方之妙在旋覆青蔥不在新絳新絳不妨代其他血藥若旋覆旋轉大氣則非他氣藥所能代晉三採用此方既加理氣之品何以反去旋覆既加理血之品何必又用新絳未免輕重倒置矣女疝張子和云女子血瘤月事不行行後小腹有塊或時動移前陰突出後陰痔核此女子之疝也但女子不謂之疝而謂之瘕予按金匱婦人門有繞氣寒疝之語是女子稱疝古書有之子和未深考耳王肯堂醫鏡云婦人小腹近陰處並結脹痛或皮肉頂起如雞子頭者乃寒氣聚於厥陰所致是為陰疝宜以官桂為主治佐以木香檳榔青皮大腹皮大小茴香香附烏藥之類煎之磨沉香五分空心服又王漢皋醫存云婦人兩胯忽生軟核如雞子大兼之臍旁引痛者乃女疝也非魚口便毒用四物加疝藥二便俱從前陰出喻氏治姜宜人奇證二便俱從前陰出病起脫血之後斷為血脫氣亂然後水穀舍故趨新舍寬趨隘又謂幽門以滲血之故釀為穀道闢為坦徑云云此說殊涉含糊以愚度之必是脫血之後有離經未盡之血阻塞直腸使糞穢不得從其故道勢必另闢一門穿漏而出非由氣亂而然亦與幽門無涉又按張石頑治一婦產後驚駭五六日惡露不行腹脹喘滿大便從前陰出以芎歸湯加莪朮肉桂焦楂一服惡露通而二便如常又治一女方四歲新秋患血痢而稀糞出於前陰作冷熱不調食積治與五苓散服香連丸二劑而愈觀此兩案亦是瘀阻直腸之症一系腸垢所瘀一系惡露連累但俱屬暴病與姜氏之得於久病者虛實不同故皆治愈雖然治愈而所以然之故石頑亦未知也又有大腸生癰以致糞穢從前陰漏出者王仲言揮塵餘話載李生治一婦腸中痛不可忍大便從小便出切脈時覺芤脈見於腸部作腸癰治以雲母膏為丸黃耆湯下下膿血數升而愈此與瘀阻症同蓋癰腫亦能致直腸阻塞也若無阻塞則糞穢斷無舍故趨新舍寬趨隘之理姜氏之證若用補血通瘀或者亦有生理恨不起喻氏而質之近有一女子生而無糞門大便從前陰出年已十八九矣此正喻氏所謂舍故趨新舍寬趨隘者然竟習以為常至今無恙亦一奇也按方書云小兒初生無糞門者死一云必假物以開之曾親見一小兒初生無糞門大便不得出腹脹如臌青筋隆起已垂斃矣檢醫宗金鑑有銀針挑撥之法一時無善手術者乃延東醫某君以刀開之糞出而愈陰吹金匱云胃氣下泄陰吹而正喧此穀氣之實也膏發煎主之吳鞠通云飲家陰吹橘半桂苓枳薑湯主之按西書載有會陰破證有辯護士某其妻久患此症常於陰際發出一種微音如穀道中之通氣者經醫診斷始知系會陰破裂其局部常有空氣通入其中故動作起居不免時發微音耳古人所謂陰吹不知是否即會陰破證乃從胃氣論治玄乎玄乎目目有水火之分氣血之異景岳云凡目病非火有餘即水不足吳昆云眼者肝之竅得水則榮失水則枯古方如益陰腎氣丸療本滋腎丸治腎虛目暗此補水法也劉河間云目病屬火張子和云目不因火則不病治火之法在藥則鹹寒吐下在針則神庭上星囟會前頂百會五穴此瀉火法也內經云氣脫者目不明丹溪治目暴盲主用參膏陳遠公治目痛用小柴胡湯加參苓氣足則邪易去汗易發古方補陽湯治青白目翳首重參耆苓朮甘溫益氣此補氣法也內經云目得血而能視河間云眼之為病在臟則為里當養血安神定志丸婦人干熟地黃丸戴復庵治目赤腫痛用四物湯加酒蒸大黃赤茯苓薄荷葉此活血法也然補水而肝腎有痹氣又宜兼通其痹如真人明目丸川椒與二地並用是也瀉火而火鬱內攻又宜兼散其鬱醫統謂散熱為治目之要苦寒劑中宜加辛溫是也補氣而氣為痰阻又宜先理其痰河間謂目昏澀者由胸中氣濁上行子和治目有用瓜蒂散頻頻湧吐之法是也活血而血為瘀停又宜先通其瘀孫兆治衛十人眼疼通其經而疾愈海藏治妻侄女目疾用溫目丸下黑血塊目愈而翳消是也古人治目法亦備矣乃黃玉楸自因目疾為庸工所誤遂歸咎古人其實古人何嘗喜以寒涼立論而桂附熱藥又何嘗不用耶口瘡王肯堂治許久薇口糜謂非乾薑不愈卒如其言又從子懋銛亦患此等極危急熱甚欲飲冷水與人參白朮乾薑各二錢茯苓甘草各一錢煎成冷服數服乃已尤在涇謂此事是脾胃虛衰之火被迫上炎作為口瘡其說蓋本諸丹溪丹溪謂口瘡服涼藥不愈者此中氣不足虛火泛上無制用理中湯甚則加附子予以為此非虛火乃鬱火耳觀丹溪先言服涼藥不愈若是虛火不但不愈必增他變此乃僅僅不愈明系火為涼藥所逼無有出路必以熱藥發之始得宣泄而愈此與瘟疫論所云疫證誤服涼藥繼則四肢厥逆更醫投附子而愈非為治病實以治藥同一機宜王肯堂所治兩證其先亦必過服涼藥因其不愈故藉乾薑以治藥耳尤氏不悟謂是虛火又謂此證必飲食少思大便不實手足逆冷肚腹作痛全是想當然語實則肯堂所治未必如此觀其從子懋銛一證既云熱甚欲飲冷則斷非飲食少思大便不實可知古今病證不同病之號以萬不特中西不同既就中言中亦有古今之異有古有今無者如陰毒陽毒是有古無今有者如痘瘡及種種新流行病是有古人視為重要而今不恆見者如真中風真傷寒是有古人混為一證而今宜分別者如金匱下利門混泄瀉滯下為一類傷寒論混五種傷寒為一類是夫古有今無不必泥古古無今有理直從今古人視為重要而今不恆見不必牽合以附會古人混為一證而今宜分別自當竟委以窮源乃有拘泥之徒不知氣運有推遷簡冊有錯亂是古非今自欺欺人及施諸實驗在在抵悟則又有人起而駁之由是空言愈多實益愈少明清以來充棟醫經大半皆是此類支離穿鑿令閱者徒費目力此亦中醫之厄運也又有名證不符者如小兒痙病名曰驚風夏月中風名曰陰暑以之論治焉能不誤又如食不得入名曰膈氣其實只是胃病與膈無涉也二便易位乃名交腸其實只是大腸膀胱間事與小腸無涉也名不正則言不順中醫際此未運欲撥寒灰揚新火當自正名始矣古方分兩古方分兩之重較之今日奚啻數倍說者謂古今權量不同而考據最精者推吳醫匯講中所載王樸莊之說謂古方一兩准今之七分六釐一升准今之六勺七抄似可據為定論然何以解於不用分兩而以枚數計者如傷寒方中每用大棗十二枚杏仁七粒梔子十四枚枳實五枚之類此等物類豈亦古小於今耶要知古方分量本重蓋體質既殊藥味又少且寓多備少服之意故分兩不得不重盧不遠云千金方用藥動則數斤習見吾儕不過兩許令人不敢動手薛立齋案又進一步蓋病重劑亦重杯水車薪將如竇材所云養殺人者矣脈難經為言脈之祖然觀扁鵲傳自言其為方也不待切脈望色聽聲寫形言病之所在聞病之陽論得其陰聞病之陰論得其陽病因見於大表不出千里決者至眾不可曲止也傳中傳載數案於貌太子則聞而知之於桓侯則望而知之均未嘗切脈蓋陰陽之理明則借脈可以合病舍脈亦能辨證此神而明之之事也西醫不重診脈大旨不過以指之壓力試心力之強弱而已然有一理則無間於中西者如舒高第云無病者之脈合度而不過滿能壓住之在指下緩緩抬起夫緩緩抬起即中醫所云有胃氣也有胃氣故為無病即有病亦易療內經診脈以胃氣故為無病即有病亦易療內經診脈以胃氣為本此所謂一言而終也脈之至數中醫候以呼吸呼吸一次脈四至者為平人西醫候以時計謂平人每分時脈應七十二至此中西醫診法不同也然用中醫呼吸法每分時所得平脈亦在七八十至之間蓋人之呼吸每分時之平均數約十八次至二十次十八次以四乘之恰得七十二二十次以四乘之恰得八十也西醫驗得老年之脈恆達於八十至女子比男子恆多七八至是七十二至乃至八十至皆為無病之脈分脈於十八次二十次之呼吸間止合四至為平之說此中西診法不同而同者也又中醫有閏以太息之法誠以呼吸有短長則至數有參差故仿歷家歸餘於閏之例得四至者為平得五至者亦為平此又定法中活法也西醫言脈之至數於年齡男女身容作息有相關之故大抵自幼至壯脈漸減少及其向衰脈漸加多形長較形短者減少女子較男子加多偃臥時較坐時減少立時較坐時加多朝時減少夕時加多飲冷者減少食熱者加多偃息時減少運動時加多優時減少怒時加多寒氣減少暑氣加多此皆法外案也醫先察此方不為所淆惑且由此說反之應加多而不加多雖得平脈而實近於遲就減少而不減少雖得平脈而實近於數此又法外法也內經言人一呼脈一動一吸脈一動曰少氣此種脈若在一分時內計之呼吸得二十次脈僅得四十至矣然觀西醫書言法王拿破崙英將究材登為當時代名人其脈每分時不外五十至間有每分時脈僅四十至乃至三十至者亦無甚病西醫言身無病時之脈間亦有亂或有歇止在病時反能合度病愈後又有歇止明王文恪公震澤長語云徐文定公為詹事時至蘇城聞王時勉名醫也令診之時勉既診以公脈有歇至不敢言公曰吾脈素有異時勉曰如是無妨是脈固有生而歇至者竊憶家鑑湖伯素無病一日戲以脈索診令覘體之虛實診得脈四五至一止或七八至一止於緩中見之脈書謂緩止曰結乃陰凝之象謂必痰濕為患伊初不信逾年秋末自江西寄一函言夏間大發濕氣頭腫目突面部時流黃水三晝夜不止易數醫方能獲愈愈後旋又病瘧頗為所困病後至今尚未復原云據此則隔歲之診固已預兆病機但當時不覺耳可見無病而得歇至脈必有隱藏之疾待時而動非真無病也至西醫謂歇至脈在病時反能合度者蓋病邪外發本脈自顯也愈後又有歇至者病有遺留餘邪仍結也豈可概視為生成固有之事而忽之脈有反關者有一手有脈一手無脈者尋按列缺穴分亦不應叩其夫知有孕時醫診亦言無脈汪曰此由稟賦本來脈不應也無足怪可見天下事變出無窮果難一一以常理測也王漢皋云醫人三指頭內亦有動脈須心有分別勿誤作病人之脈此事未經人道太素脈太素脈訣專言人之窮通貴賤所作歌括多俚語全無理趣然古之善太素脈者能察父脈而知子貴察夫脈而知妻亡其應如神雖以王荊公之學識猶為所惑予觀景岳矯世惑脈辨力闢其妄且引巢氏之說曰太素者善於相法持假太素以神其術耳色診內經色診大抵忌滯晦而喜光澤然有無故面色忽呈光澤者非吉兆也溫公詩話云梅聖俞之卒也宋之才曰比見聖俞面光澤特甚意為充盛不知乃不祥也時韓欽聖面亦光澤沈文通指之曰次及欽聖矣眾皆尤其暴諺不數日欽聖抱疾而卒辨舌偶閱大陸報有覘舌斷病法大指謂舊時理想以舌之生苔為消化器不良之一種徵驗近時科學發明知古之生苔不盡由此如積勞失眠過傷目力及神經瞀亂憂鬱過度之人往往生濃之舌苔因舌苔乃頭蓋骨底盤破碎後所生故也予按消化不良與神經病皆能生濃厚之舌苔以吾所得於經驗者言之則同一濃厚之苔而在消化不良者見之可斷其為宿食在患神經病者見之可斷其為積痰痰與食皆能令舌苔增厚且色之黃白質之燥潤尤當細辨以為虛實寒熱之徵驗中醫古書皆詳於切脈而略於覘舌及敖氏傷寒金鏡錄出始於外感門中開覘舌一法只以舌證不能脈辨為千載不偶之秘書至葉天士著溫熱病論驗舌之法尤覺淺而易知簡而易守雖未由以今日學理解釋其所以言之故然既切於應用固百世不能廢也又高士宗醫學真傳亦有辨舌一篇大致以舌紅為正色以黃苔為虛寒其說與諸家相反蓋經驗不多而又好為高論以欺人耳其說不可從寒熱表用寒熱表者驗得身熱有左右高低之不同便知其系半身不遂即癱瘓與腦部等之病證據此可見中風是冷熱二氣左右相引亦猶空氣因冷熱不均而生風故仲景論中風以正氣引邪或左或右為言而藥則寒熱並用也驗得熱證如感冒傷風發熱等自始至終皆有一定之準則及其朝夕加減之輕重絕無忽然變遷驟加速減者據此可見六淫為病營衛氣血有淺深表裡上下有次第用藥不可混亂也驗得熱證於急愈後其熱度往往退至常人之下數日復原據此可見熱證愈後不可過用寒涼致令陽氣衰微精神難復驗得小兒身熱常在頃刻之間而加高不可遽認為必發大熱證之先兆此乃暫時之熱不久便退據此可見小兒陰弱熱度易升每多痙厥又可以見稚陽未充雖有大熱不可恣用寒涼而伐生生之氣也他如飢飲勞扶忿怒思慮皆於熱度有相關之事切脈之工須參識此意經脈靈樞五十榮云人經脈上下左右前後二十八脈周身十六丈二尺呼吸定息氣行六寸二百七十息氣行一十六丈二尺一周於身一萬三千五百息氣行五十榮於身脈度云手之六陽從手走頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六陰從足至腦中六尺五寸六六三丈六尺五六三尺合三丈九尺蹻脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺據此則是二十八脈一十六丈二尺周而復始陰陽相貫如環無端明矣而難經本榮氣篇之文謂榮氣之行始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注手太陰考靈樞經脈篇十二經經脈之行次亦同是十二經自為循環何得又有任督蹻四脈以間之然無任督蹻四脈則不合於周身一十六丈二尺之數即不合於一萬三千五百息氣行五十榮於身之數兩說互異如此且據五十榮及脈度之說是分十二經為二十四脈先後相續而行據脈經及難經之說是合二十四脈為十二經脈左右相併而行十二經脈之行次始於手太陰終於足厥陰二十八脈之行次則又何始何終乎此古書所以不可盡信也絡脈靈樞謂絡有十五十二經各有一絡加任之尾翳督之長強脾之大包是為十五絡越人翻靈樞舊案易任督二絡為二蹻絡其說固不足憑然素問有胃之大絡名曰虛里一節靈樞不言是靈樞有遺文也李東垣謂當增胃絡為十六絡喻嘉言謂十五當並八奇經合為一絡再增胃之一絡合於十二經絡及脾絡仍得十五絡之數予謂東垣固屬武斷嘉言亦甚牽強靈樞明分任督為二令並八奇經為一何所據而云然如謂胃之一絡無處安置必如是配合方有著落然脾胃相連脾絡既名大包安知不並胃絡而亦包之合八奇經為一如何合脾胃為一之為得也要之經絡之說古人當別有據後世無從查考閱近世人體解剖圖動靜脈管縱橫交錯如網之絡若以十二經十五絡之說為之支分派別不啻治絲而紛則古書似不可信然針科所傳銅人圖按穴療病卻有奇效則古人又自不妄予意經絡云者是指無形之氣道不在有形之血管雖精於解剖者無從測其底蘊也甜肉經美車柯為良氏譏吾國醫書無甜肉經夫甜肉經即東醫所謂臟臟即吾國醫書之所謂脾也其汁甜故書曰其味甘甘先入脾其汁入胃化食故曰脾傷則不磨其位置橫貼於胃後故曰脾與胃以膜相連其體質極柔軟故曰陰中之至陰然則吾國之所謂脾即是臟即是甜肉經李東垣以善治脾胃著稱後人翕然宗之是吾國之視甜肉經與胃並重也至胃之左側有一大腺色深紫西醫謂之脾者此乃醫林改錯所謂總提不名為脾也柯氏誤以吾國所謂脾者是指此物遂疑吾國醫書無甜肉經抑知吾國所謂脾乃在彼不在此乎膻中李士材曰膻中者包絡之別名此語大誤內經所謂膻中是指橫膈膜腹中呼吸全以膻中為主吸時則收縮而扁平呼時則復舊而隆起腹腔之容積因之而伸縮故內經稱為氣海為人身重要部分包絡是心外衣與此絕然不同何得為膻中是包絡之別名然內經有時又云膻中者臣使之官膻中者心主之宮城此則是指包絡蓋膻中包絡內經往往混稱宜士材有此誤會也三焦三焦或云有形或云無形紛紛者久無定論然按靈樞云密理厚皮者三焦厚粗理薄皮者三焦薄又云勇士者三焦理橫怯士者三焦理縱又云上焦出於胃上口並咽以上貫膈而布胸中中焦亦並胃中出上焦之後泌糟粕蒸津液化精微而為血下焦者別迴腸注膀胱而滲入焉水穀者居於胃中成糟粕下大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉夫既有厚薄縱橫又各有其部位則有名無形之說固不足據陳無擇謂三焦有形如脂膜袁淳甫以人身著內一層為三焦李瀕湖謂核桃之形有似三焦已隱隱將三焦形狀指出他如東垣景岳輩既不敢從難經脈訣之說謂其無形又不敢憑想象之見信為有形遂發三焦有幾之疑問真乃扣盤捫燭之談王清任曾親見臟腑當知三焦之所在無如見其形不知其名譬如訪一素未謀面之人遂乃失之交臂也蜀天彭唐容川著中西匯通醫書雖多牽合附會識見單簡惟解三焦即是連網與陳無擇等說頗合而尤為詳盡當可據為定論然尚有一間未達者則以三焦為利水之具不知水入於胃由吸管攝入回管過肝入心運行周身出於肺為氣旁溢皮膚為汗下入內腎為溺皆必有管以束之如水行大地必有堤岸若云三焦利水絕無堤防則懷山襄陵不幾成一洪水滔天之世界乎氣管閉蓋飲食入口咀嚼下咽時其舌根必上抵則氣管閉而飲食專自食道下矣食管通鼻處有軟口蓋下咽時防護之使飲食不致嗆入於鼻此說在中醫書中惟王清任知之其論痘瘡飲水即嗆是瘟毒燒煉會厭血凝不能蓋嚴氣門故飲水滲入即嗆化開會厭瘀血其嗆立止此說誠然按論語食不語楊氏注云肺為氣主而聲出焉飲食則氣窒不通語言恐傷之也此以生理解經固自可喜惜乎詞不達意予謂飲食則氣窒不通當改作飲食則氣門閉蓋語言恐傷當改作語言則氣門復開飲食嗆入恐嗆之也如此則詞達矣醫林改錯泰西當吾國西漢時埃及亞歷山大學寮中始行人體解剖學嗣以迷信宗教故其學因中斷馴至十四紀以還乃再興此學十八世紀之末發現顯微鏡之用其學遂日臻隆盛按靈樞言人死可解剖而視之是吾國解剖學發明最早特以跡近殘忍故其學不興漢書王莽傳有使太醫尚方與巧屠誇剝刑人之屍量度五臟其脈之事然不聞有所發明崇寧水能浮舟亦能覆舟原不專指賊風言也月月隨地行如針磁之相引月既與地有關係人居地上亦不能與月無關係故靈樞曰人與天地相參也與日月相應也治病不知日月不得謂良工矣惟日與人之關係尚有知者月之關係經雖言之而知者絕少惟春秋傳有晦淫之說金匱論瘧有十五月盡之說千金病源有小兒月蝕瘡隨月生死之說成無己注傷寒太陽篇血弱氣盡句謂當在月郭空時云云馮氏錦囊陰陽論中有朔望分陰陽一條此外方書罕有言月者近有法人焦奴士威爾氏者著環遊月球小說云月球與人之疾病大有關係紀年傳染病大作罹此病而死者月蝕時最多他如發狂等證亦多在月新月滿之時蓋月蝕則光熱缺故病邪內陷而死月初則光熱驟加月滿則光熱愈大故病邪外越而狂此理所必然而可證內經之說者也至女子經水方書亦稱月信其因應月一行如潮之有信故取譬而名試問月信所以應之理則必懵然須知在地為水在人為血故胞宮以血海名海之有潮以月之吸力也月吸海水而成潮信亦能吸血海而成月信靈樞曰月滿則海水西盛人血既積月郭空則海水東盛人氣血虛可見血海之被吸亦與海水無異西人驗得海水置在脊骨活體內一如血然能與脊骨物體生物上放去若干血而以海水補代使該話體毫無痛害可見海水與血其性質有相似相同之處故皆與月有關係惟血海有盈虧必盈科而後進故月信只每月一次海水無盈虧故大小潮每月四次此又同中之異也知此則知月信之命名固有確不可易之理且不特月信與月有關係凡男女經絡之血無不隨月為盈虛素問云月胎生則血氣始精月郭滿則血氣實月郭空則經絡虛月生而瀉是謂臟虛月滿而補血氣揚溢絡有留血命日重實月郭空而治是謂亂經此則無分男女而皆與月有關係者也云云在天空與人身氣血亦有相關之故然古惟針灸科曾一及之用方藥者鮮能救此惟杭州府志載錢塘葛林治楊公子一案假雲氣以濟方藥之窮殊有妙理少師楊公子當暑眩已絕且移之木矣林趨入曰無傷也亟出之公曰兒已噤矣奈何劑也林曰予無劑也所恃者天上云耳云生而悽悽欲雨陰氣舒而陽郁消吾以清利物煮水而蒸其下其可瘳乎如其法而疾愈迨暮而兒戲於庭矣內證亦無不可移臟病可移於腑如魏玉璜治一少年一老人勞嗽失音為用集靈膏皆下生痔而愈是也重病移之使輕如錢仲陽患周痹恐其入臟自用藥移之使病在末故左手足雖不用而能享天年是也內部移之外出如張子和治川德源洞泄治之漸愈而足上患一癤謂是里邪外出病痊之候是也又王海藏云少陽病用柴胡移其時早移於晏晏移於早氣移於血血移於氣使邪無可容之地是內證亦有移治之法也大抵病之不能痊愈不能速愈者皆須用移法此可補石室秘錄一百二十八法所未備以意讀書醫者意也以意用藥亦可以意讀書如內經驚者平之此平字有鎮定之意而張子和解為平常之平以為平常見之則不驚也曾治一婦大驚後聞有聲響則驚倒不省乃故擊幾以驚之擊四五次然後徐徐驚定是夜擊門窗自昏達曙熟臥不聞此以意讀書之一驗也金匱婦人妊娠篇有絕之之語此絕字明是斷絕之絕觀原文謂妊娠惡阻於法六十日當有此證設有醫治逆者卻一月加吐下者則絕之明言誤治則斷絕其胎孕也樓全善解絕之為禁絕其醫藥曾治一婦惡阻病前醫愈治愈吐遂借禁絕之旨以炒糯米代茶止藥月餘漸安此又以意讀書之一驗也非圓機之士未易語此內經以前有醫經內經鬼叟區曰臣斯十世岐伯曰先師傳之往聞其旨黃帝謂雷公曰夫子所通書受事眾多矣是醫固不始於岐黃其著內經亦必有所本茲觀內經所引書目曰上經曰下經曰刺法曰奇恆陰陽曰陰陽十二官相使曰金匱曰太始天元冊曰脈法曰大要曰陰陽傳曰脈經上下篇曰從容曰玉版論亦云搏矣而今不傳並不詳何人所作意者此真岐黃之書而今世所傳內經乃戰國人之偽話歟福醫有患三陰瘧者百治不愈已近三年聞有時醫某初出懸壺證事甚盛即往求治醫索閱前所服方曰諸藥已嘗過予豈有妙法無已其惟雞納霜乎其人曰亦已服過數次矣醫沉思良久曰試再服之藥同而付藥之人不同今藥付於我手即是我之藥也或者其有驗乎其信之果一服而愈蓋此醫明知技窮所能自信者時也運也諺曰乘我一年運有病早來醫玉堂閒話有福醫之說殆此醫之謂乎撫州府志李生王生忘其名並撫人醫道並行王亞於李崇仁有大室邀李治病約愈謝五百婚李療之旬日不差諭以更用王醫乃留數藥而別道遇王醫告之故王曰吾技出兄下今往無益不如俱歸李曰不然吾得脈甚精處藥甚偃其不愈者不當得謝耳故辭公往以吾藥治之必愈王如其言悉用李藥微易湯使進越三日疾瘳富室如原約酬王王歸一半遺李曰公治疾吾何功李必不可曰此公之福命也按此即某時醫所云藥同而付藥之人不同也然觀羅謙甫福醫說是福醫之殺人其禍尤烈謙甫曰醫之福福於渠者也渠之福安能消病者之患然則世之信任福醫者可以憬然矣疑醫偶見一貧醫為人治疾其人眼藥未竟即覺不安格格欲吐而又不得吐懊憹殊甚所親有知醫者謂方甚平穩並無作吐藥不必過慮其人遂安逾時其病亦失予按千金翼云疑師不治病疑藥不服之服之既不得力決意不疑者必大驗一切藥有從人意即神疑人必失此人疑醫之貧而懼其術之必謬疑懼交併故胃不安而欲吐耳嘗閱近人筆記述清初鹽商某有微恙延醫診治醫謂書方既罷鄭重言此方無足奇須得羊脂玉瓶一值千金者碎之以其片入藥煎和則疾可速愈也某果出所藏古王瓶碎之一劑而疾愈以為神醫立贈千金人或問醫玉瓶煎藥有味乎醫笑曰此術耳藥數文錢可購縱足愈病得毋為富翁所輕視乎故碎其寶器以足之且亦使心理注重則病自易愈也此雖不足為法其言則深為有理巫醫論語人而無恆不可以作巫醫以巫為醫也南人惑於神鬼信巫不信醫有病不重方藥惟事祈攘故醫事以巫代之遂有巫醫之名邢疏岐而為二集註仍之未免欠考徐春甫古今醫統謂巫醫即巫覡之徒擊鼓舞趨祈禳疾病不知醫藥之理者故南人謂之巫醫者此也今世謂之端公太保又稱夜行卜士北方名之師婆雖是一切虛誕之輩而亦不可無恆也予按通志許楊傳王莽纂位楊變姓名為巫醫是巫醫之名漢時尚存而亦大有人在未可一例輕視考上古穴居巢處民智未開皆以疾病為鬼神所祟惟尚祈禱至神農嘗百草始知有藥黃帝作內經始知有醫是醫實濫觴於巫而巫遂以兼醫醫巫之最著者曰巫彭曰苗父曰巫咸曰俞附皆古之巫醫也稽神錄陳寨泉州晉江巫也善禁咒之術為人治疾多愈神仙傳沈羲學道於蜀中能消災治病救濟百姓又王遙能治病但以八尺布趴敷於地不飲不食須臾病愈便起去又壺公者有召軍術召鬼神治病玉府符凡二十餘卷醫不自醫淮南子謂醫不能自治其病者為悖然古名醫如錢仲陽患攣痹龐安常患聾聵許紳患驚悸張養正患瞽皆不能自治劉河間病傷寒而救於張潔古盛啟東中毒藥而療於草澤醫人盧不遠患血證自治幾危而挽救於其子子繇然子繇患瞽則又不能自治蓋一則病根沉錮藥石無功一則痛切肌膚方寸先亂故也梁武帝梁書世祖本紀世租諱繹高祖即武帝第七子也初生患眼高租自下意治之遂盲一目周書姚僧垣傳梁武帝嘗因發熱欲服大黃僧垣曰大黃乃是快藥然至尊年高不宜輕用帝弗從遂至危篤梁簡文帝勸醫論云比之術者未嘗嵇合曾無討論多以少壯之時涉獵方書略知甘草為甜桂心為辣便是宴馭自足經方混棄及其愛深親屬情切支肌患起膏育疴興府俞雖欲盡其治功思無所出何以致然本不素習卒難改變故也此殆鑑於武帝之事不覺言之痛切歟死生有命死生有命命不應死有病不藥亦愈應死者縱使病愈終亦必亡酉陽雜俎載柳芳子登疾重名醫張萬福視之遙見登頂曰有此頂子何憂也因診脈五六息復曰不錯壽且逾八十乃留方數十字謂登曰不服此亦得登後為庶子年九十而卒北齊書邢邵子大寶患傷寒馬嗣明為之診候脈退告楊愔云邢公子傷寒不治自差然脈候不出一年便死覺之晚不可治後果未期而卒數學古之醫道多兼數學史記倉公傳公孫光屬意於慶子男殷曰意好數公必謹遇之後漢書方術傳華佗兼通數經曉養性之術又郭在師事程高學方診六徵之技陰陽不測之術北齊徐之才本傳之才少解天文兼通圖讖之學千里為陰陽祿命諸家相法及灼龜五兆周易六壬並須精熟方為太醫若不爾者如無月夜遊動致顛殞明外史葛乾孫兼通陰陽律歷星命黃梨洲作景岳傳稱其於象數星緯堪輿律呂皆能究其精蘊遼陽之敗亡中原之擾亂皆預決於數年之前王胥山跋醫家心法云鼓峰醫術自是高手四明人傳其起痼扶衰懸決生死日時多奇驗及觀其自述醫案中所載浯溪呂氏婦產後驚悸診脈而知其幼時有齒病致大驚之事詢之果然人問何以知此答曰脈法當如是耳不精幹象數鈐法之學不能也我儀其人必旁通象數而參用其術要之不盡自醫經中來五行內經以金木水火土為五行分配人身臟腑此不過借有形之物為研究虛理之對象非謂人身確有所謂金木水火土也近有德國某醫云人重一百餘斤者身中鐵質可造大釘七枚油可造洋燭十斤燐質可作自來火火柴十二萬根鹽得二十小茶匙糖得五十塊每塊約半寸立方水得四十升醫士之言如此是人身確有金水火糖味甘在五行中又可以土例之然則但少木耳而內經言在夭為風在地為木木與風一而二者也風與氣二而一者也人身有養氧氣輕氫氣炭碳氣此氣也又可以木例之然則五行之說不僅虛理皆有實質可尋但散在人身各部若何以臟分配之處則難以學理說明之男子有乳腺進化論大家達爾文言男子初本有乳腺皆因不用而廢予按後漢李善為李元蒼頭元家疫相繼死惟有孤兒續始生諸奴婢欲殺續分財善潛負續逃親自哺養乳為生潼唐元德秀兄子襁褓喪親無資得乳溫乃自乳之數日潼流能食乃止此兩事雖由至誠難以常理揣測然亦可證男子有乳腺之說也口涎試賊印度人失物疑同伴所竊令各嚼飯一口吐之見飯最乾者即系竊物之人蓋因驚恐則涎水不生也而其所以然之故惟內經詳之經云廉泉玉英者津液之道也又云腎在液為唾腎脈上挾舌本而廉泉玉英二穴在舌下腎氣上行至舌則涎唾從二穴而出驚恐則涎唾不生者經云腎在志為恐恐傷腎又云恐則氣下腎傷氣下則津液不能騰布於舌矣然經又云思勝恐假令竊物者預思瞞蔽之術則臨時不致張皇而口涎試賊之法恐不驗矣地方素問五運行大論帝曰地之為下否乎岐伯云地為人之下太虛之中者也帝曰馮乎岐伯曰大氣舉之也是明知地為圓體矣乃靈樞又有頭圓象天足方象地之說何也蓋在天中雖為大氣所包舉然究竟是否渾圓古今中外之地學家皆不能斷若就吾人所見而論地球水多幹陸原是渾圓無缺之體則必不能圓地之缺處多作尖角形則究合乎方以足比之最為相宜今亦有人言地球全圓必至歸直角立體之形者可見地方之說不盡無據也煎藥宜慎續醫說言一人病蠱腹膨脹所謂蜘蛛病者或進清暑益氣當煎藥時偶墜蜘蛛腐熟其中童子懼責潛去蜘蛛尋以藥進病者啜腹中作聲反復不能安枕既而瘦溺鬥許腹脹如削健康若平日裴兆期言有病陽症似陰者醫投桂附一婢煎之適傾潑茫無以應借黃連香薷飲一杯代之竟一飲而瘥此兩人者蓋有天幸冥中若假手童婢以救之也然由此反思則此童此婢亦狡且險矣沈存中曰古方之飲藥者煮煉有節飲啜有宜水泉有美惡操藥之人有勤情此服藥之難也東垣曰病人煎藥必擇人煎藥能識煎熬製度須令親信恭誠至意者為人煎藥銚器除油垢腥穢必用新淨甜水為上量水大小斟酌以慢火煎熬分數用紗濾去渣取清汁服之無不效其慎重如此豈可漫付童婢手耶幼時聞某老醫治一小恙藥進而其人中夜暴亡病家問罪於醫醫自辨曰予方甚平和即不中病何致殺人此似中毒而死必藥鋪誤發毒藥取渣驗之藥並不誤醫愈惶惑乃取渣嘗之則鹼極不可入口醫曰我藥不鹼今此極鹼如滷何也因詢煎藥人乃龍鍾老嫗夜裡倉猝誤取滷水煎藥故中滷毒死耳於是醫之冤始白我謂煎藥失宜與藥肆作偽均足誤人近聞有人慾將習用藥品信照西人煉成藥水不特功力專精亦且施用便利此事若成豈不甚善余笑曰此乃東坡所云終日說龍肉也徒悅聽聞不可得食且吾國方藥其妙用要在煎法得宜悉煅煉必多失性仲景為立方之祖觀其用藥有先煮者有煮成納入者有去渣再煮者有淋沸湯漬之者有為末拌吞者有宜丸者有宜散者古人豈徒為是紛紛哉蓋必有妙用存焉耳雜療土狗治水腫治上用頭治中用腹治下用尾治左用左治右用右蜣螂治便閉大便閉用上截小便閉用下截蟬蛻治小兒夜啼用下半截或者不信用上半截則啼復如初此中奧雖經於化學者恐亦無從查驗也延壽書云有人好食豆腐中毒醫不能治作腐家言萊菔入湯則腐不成遂以萊菔湯下藥而愈閱微草堂筆記飲滷汁者狐傳一方云取磨豆漿灌之滷得豆漿則凝漿為腐而不凝血一則欲其不成腐一則欲其凝漿為腐計以人身作造腐廠亦一奇也張景岳治小兒誤吞鐵釘用磁石朴硝研末熬豬油加蜜調服遂裹鐵釘從大便而出按此即千金方之加味者耳千金治小兒誤吞針方取磁石如棗核大吞之及含之其針自出余謂以棗核大之磁石吞之固無此理含之未必有功景岳變通其用加朴硝油蜜使著者著逐者逐潤者潤四物同功合力裹之而下具見巧思白木耳能補內部損傷冷廬醫話載汪生患腸紅兩月餘日漸消瘦有人傳方白木耳水煮淡食日一錢未及一月全愈按此係腸部損傷出血故用之有效若傷在中上二部者當研末酒沖服曾有人試過云甚驗槎庵小乘載晉魏詠之生而兔缺得名醫割而補之百日而瘥全唐詩話載崔嘏舊失一目以珠代之不知古之醫人何處得有此術梅聖俞河豚詩云春州生獲芽春岸飛楊花河豚當此時貴不數魚蝦歐陽公謂河豚出於春暮食絮而肥南人與獲芽為羹云最美故知詩者謂破題兩句已道盡河豚好處而石林詩云河豚至柳絮時人已不食謂之斑子或言腹中生蟲故惡之而江西人始得食公吉州人故所知者江西事也余謂獲芽為羹亦非取其味美實欲藉以解毒歐公未言即作詩者亦未必知也東坡詩云蔞蒿滿地蘆芽短正是河豚欲上時蔞蒿蘆芽俱解河豚毒東坡知醫者隨意寫景不知含有此意否類編載楊吉老診一士人謂三年後當以背疽死茅山道士令日日吃梨遂獲安痊耆舊續聞一士人過泅州有解太素脈者謂來年有官然有病也問何病曰病疽病士子到京來年登第求診於醫醫令啖梨二百許既而遍身患瘡以藥調和其內尋愈出京見向診脈者問以何藥得療乃以梨事對脈者呼其子設香案望京師而拜曰不可謂世間無人余曾治一人患腋癰因食豬頭證勢大作胸臂皆發赤斑亢熱無汗服藥皆吐思食梨遂教食之食才過半即大汗解赤斑亦退後竟不服藥而癰亦消真出意料也陶南村輟耕錄載有木乃伊云天方國有人年七八十歲願捨身濟眾絕不飲食惟澡身食蜜死屍殮以石棺仍滿用蜜浸之百年後啟封則成蜜劑遇人折傷肢體服少許立愈本草綱目採之實荒誕不經按西書有云埃及古代凡人死後爬剔腦髓截開腹壁洗以香水填以香料謂其人之靈魂必再歸此肉體名之曰木乃伊不知與陶氏所說是一是二蘇沈良方云目赤不可浴浴湯驅體中熱並及頭目目必甚李瞻治一人目以氣虛暗如行霧中瞻先令以沸水浴洗兩足三日後以一藥而瘳或間其故瞻曰氣虛人榮衛不和湧泉穴位足底熱之則上可達於泥丸必血活而藥始效一是實證故忌浴一是虛證故宜浴足以用藥而論前證自宜清涼後證非補氣活血不可酒能亂性酒氣遺傳生子必多愚魯雍端年十二不識六與七以其父固酒徒也李白斗酒詩百篇而其二女不聞有詠絮才然欲得佳兒宜先戒酒矣又乘醉成胎令子骨軟秋燈叢話載南陽某太守子生而骨軟若癱瘓者十餘歲猶溲溺需人醫藥罔效有布商葉某者言能療此疾不須藥餌惟取美酒數十斤布列兒左右煮之歷三晝夜兒起立運動如常人守厚酬之潔其故商曰我祖良醫也嘗謂乘酒成胎者產子多骨軟須用酒氣重達四肢以堅其骨聞公素喜飲必犯此症故依方療焉更有乳母嗜飲能令兒醉醫學入門載呂復治一女孩病嗜臥面頗赤而身不熱醫以慢驚風治之兼旬不愈復診其脈有關獨滑而數他部大小等而和曰此女無病關滑為有食積意乳母嗜酒酒後輒乳故令女醉非風也及詰之果然遂以枳殼葛花日二三服而愈醫須異授許知可夢白衣人勸其學醫助其智慧果得盧扁之妙張潔古夢有人用大斧長鑿鑿心開竅納書數卷自是洞澈醫術劉河間遇異人以酒飲之大醉寤後洞澈醫術事之有無不可知或亦假託神鬼以信其術於人耳然書傳所載名醫皆得異授此則確有可信非盡虛誕者也不得異授專恃方書雖讀破萬卷多岐反惑許胤宗曰醫者意也吾意所解口莫能宣也又曰脈之妙處不可言傳虛著方書終無人能悟故胤宗不肯著書然則書者古人之糟粕也龐安常曰所謂難經者扁鵲寓術於其書而言之不詳豈惟難經一切方書皆當作如是觀養生知覺運動人生酸化之作用也有作用即有消耗人身蛋白質脂肪及水灰分所以供酸化之消耗而因以成其作用者也消耗既盡則作用廢而人以死火消膏以成其光人見有光之用而不知其膏之暗耗也千金引老子之言曰人生大限百年節護者可至於歲如膏用小炷之與大炷旨哉言乎信如是則渾渾噩噩無慮無思七情俱亡六窗皆閉似可以免消耗而得久視長生之術然物競爭存天演公例使人守寂滅勢固萬萬不能亦覆成何世界蓋天地不仁以萬物為芻狗一切含生負氣者皆顛倒於其中而不能免故作用之消耗非吾人之諱言而養生家之說必難普及於人群美國醫師北阿篤氏言新世界以商工業之競爭處此繁劇之社會有不得不多用其腦力者故其國患腦病者最多遂名為美利堅病一若以有此病為其國之光榮者然觀吾國人此等病未嘗見少惟有一言不得不為吾人正告者即對於作用之消耗當辨其有益與否也若以有用之身供無益之消耗則失計算甚矣
