body:
  text: 跋休寧戴君谷蓀故多才藝負博雅名晚歲客南通沒世時以所為詩文醫話付友今已二十餘年友將刊其醫話期踐夙諾持以示余其中關於辨證論治方面不乏獨得之見是以對症投藥恆收驚人之效此種創造性經驗頗多足取中醫理論自成體系醫籍浩如煙海學說又多派別而經典著作異常奧妙戴君對此窺涉甚深能融會諸家之說以經典為依歸並聯系實際折衷一是於臨床診療往往手到春回蓋非偶然當亦符於理論與實際相結合之旨祖國醫學遺産蘊藏甚富亟待整理取精去粗以發揚光大更好地為人民健康服務而交流臨床經驗提高醫療效率誠屬當前急務戴君醫話可作醫藥實踐中參考之資惟寫用舊式論斷多於敘述以今世觀點衡之尚屬遺憾戴君詩文喜釣奇醫學造詣亦至難能徒以素性質鈉不工媚悅萍蓬飄泊於舊社會郁不一施奇窮至死此固往昔所同慨安能以其醫名不彰而忽識之耶一九五七年七月瞿立衡跋於南京
