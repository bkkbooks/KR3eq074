front:
  text: 觸庵醫話序言友人戴谷蓀下世之六年日本稱兵來犯抗戰已十有八月而南通淪陷亦十一月余舉室避亂來申流離顛沛無以為計因思谷蓀病亟時嘗出所著醫話為身後之託今且未知其子蓉生流徙何所能免飢寒否也醫話雖幸攜客笥人事不可知設舉其平生精力所萃謂可信今而傳後者而亦付之冷風空波即於淪沒其疚負為何如耶君故休寧諸生流寓泰興季家市庸衣凡帽沙健庵太史於儕衆中獨驚為才士酬唱往還不倦嘗讀其詩頗似趙甌北畫則入四王之室意其為魁捂丈夫及得相見則貌寢而聲不揚且病聾特秀溢眉字耳君論詩揚孟郊而抑賈島而窮乃過之又謂文須讀韓詩須讀杜如修道人用逆行法造詣乃高以庚午鬻畫來通莫知其能醫也一日同舍有病暑者初若不過劇君聞呻詫曰是將不起庸醫不知疏解火鬱於中必無辜矣兒子嘗病尪君令以神砂黑礬參糖棗為丸余購於滬肆不得歸質諸君曰此賤藥以有毒不輕售豈知將必武健且砂礬得糖棗之制其毒已殺奚害陳君亦奇病寒熱便結半月更數醫不效介君診治斷為肝木犯胃不上不下投藥一劑而愈於是朋輩展轉相傳病者始爭延之凡經其診治者輒著奇效君立方不循常軌亦無尋常醫士習態友有為謀鬻醫話於書賈者君聞與書曰余稿成於四十許時融會古今百家醫集折衷一是雖無關於市井懸壺之用而茶餘酒後可資談助亦筆記之一種自謂頗有心得但世多以耳為目荒江腐儒素不為人所知人必笑為妄作如何能賣錢君既窮甚晚年又喪其妻有傭婦曰王媽者君以二奶奶呼之嘗笑謂余王壬秋能呼周媽而弟不能可見學前人一端尚不能及況其他乎其風趣如此顧行若弛而忠實無他腸與余友人久而益親初名其豐諱谷孫一字觖庵居南通四年而卒年五十有六卒之前一年劉君振纓輩為醵資刊其詩遺文存亦奇所今南通已為虎狼窟宅回首舊遊殆如隔世而余飄泊海上鬚髮亦種種矣深懼付託之雅適同學友袁亦奇之哲嗣正剛從事中國醫藥雜志姑檢付之以稍完我先友之志併為敘其大凡嗚呼是果能使君傳耶中華民國二十八年南通鏡人瞿竟成拜序
